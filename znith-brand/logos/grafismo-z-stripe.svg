  <defs>
    <pattern id="zStripe" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M4 4 L20 4 L20 7 L10 17 L20 17 L20 20 L4 20 L4 17 L14 7 L4 7 Z"
        fill="none" stroke="#DF9F3E" stroke-width="0.5" opacity="0.2"/>
      <path d="M24 24 L40 24 L40 27 L30 37 L40 37 L40 40 L24 40 L24 37 L34 27 L24 27 Z"
        fill="none" stroke="#DF9F3E" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="80" height="80" fill="#091022"/>
  <rect width="80" height="80" fill="url(#zStripe)"/>
</svg>
