<!-- Lideres Leoes — Lion Head Profile (Navy on Transparent) -->
<!-- Geometric/refined line art, profile facing right, watchful governance posture -->
<!-- Works at 32px+ as badge/icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <g fill="none" stroke="#091022" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Mane — architectural radiating lines from the head, suggesting authority -->
    <path d="M18 20 C14 14, 20 6, 28 8"/>
    <path d="M14 26 C8 22, 8 12, 16 10"/>
    <path d="M12 34 C4 32, 2 22, 10 16"/>
    <path d="M14 42 C6 42, 2 34, 8 28"/>
    <path d="M18 48 C12 50, 6 44, 10 38"/>

    <!-- Head structure — clean geometric profile facing right -->
    <path d="M28 8 C36 6, 42 10, 44 16 L46 18 C48 20, 48 24, 46 26 L44 28"/>

    <!-- Forehead to nose bridge -->
    <path d="M44 16 C46 18, 48 22, 46 26"/>

    <!-- Eye — single precise circle, watchful -->
    <circle cx="38" cy="20" r="2" fill="#091022" stroke="none"/>

    <!-- Brow — strong architectural line -->
    <path d="M32 16 L42 16"/>

    <!-- Nose and muzzle — facing right, calm -->
    <path d="M46 26 C48 28, 50 30, 50 32 C50 34, 48 36, 46 36 L40 38 C38 38, 36 40, 36 42"/>

    <!-- Jaw line — strong, governance -->
    <path d="M36 42 C34 44, 28 46, 24 46 C20 46, 18 44, 18 42"/>

    <!-- Chin to throat -->
    <path d="M18 42 L18 48 C18 50, 22 52, 28 52 L38 52"/>

    <!-- Crown — minimal geometric, three points -->
    <path d="M26 8 L28 2 L32 6 L36 0 L40 6 L44 2 L42 10" fill="none" stroke="#091022" stroke-width="1.5"/>

    <!-- Neck line -->
    <path d="M38 52 C42 52, 46 48, 46 44"/>
  </g>
</svg>
