<!-- ZNITH.AI Sub-brand Lockup — White text for dark backgrounds -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 60">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&amp;display=swap');
    </style>
  </defs>
  <!-- ZNITH in Cinzel Light (300) per brand spec -->
  <text x="0" y="42" font-family="Cinzel, serif" font-weight="300" font-size="42" letter-spacing="0.1em" fill="#FFFFFF">ZNITH</text>
  <!-- .AI in regular weight, gold accent -->
  <text x="218" y="42" font-family="Cinzel, serif" font-weight="400" font-size="42" letter-spacing="0.05em" fill="#DF9F3E">.AI</text>
</svg>
