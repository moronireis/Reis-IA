<!-- ZNITH.AI OS Sub-brand Lockup -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 60">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500&amp;display=swap');
    </style>
  </defs>
  <!-- ZNITH in Cinzel Light (300) per brand spec -->
  <text x="0" y="42" font-family="Cinzel, serif" font-weight="300" font-size="42" letter-spacing="0.1em" fill="#FFFFFF">ZNITH</text>
  <!-- .AI in lighter weight, gold -->
  <text x="218" y="42" font-family="Cinzel, serif" font-weight="400" font-size="42" letter-spacing="0.05em" fill="#DF9F3E">.AI</text>
  <!-- OS badge-style -->
  <rect x="305" y="18" width="42" height="26" rx="3" fill="none" stroke="#DF9F3E" stroke-width="1.2"/>
  <text x="326" y="36" font-family="Montserrat, sans-serif" font-weight="500" font-size="14" letter-spacing="0.1em" text-anchor="middle" fill="#DF9F3E">OS</text>
</svg>
