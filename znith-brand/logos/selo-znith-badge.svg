<!-- Selo ZNITH — Implementation Completion Badge -->
<!-- Circular institutional seal, premium certificate feel -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#DF9F3E" stroke-width="1"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#DF9F3E" stroke-width="0.5"/>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#DF9F3E" stroke-width="0.5"/>

  <!-- Architectural motif — diamond points at cardinal positions -->
  <path d="M100 6 L103 10 L100 14 L97 10 Z" fill="#DF9F3E"/>
  <path d="M100 186 L103 190 L100 194 L97 190 Z" fill="#DF9F3E"/>
  <path d="M6 100 L10 97 L14 100 L10 103 Z" fill="#DF9F3E"/>
  <path d="M186 100 L190 97 L194 100 L190 103 Z" fill="#DF9F3E"/>

  <!-- Decorative dots between rings at 45-degree intervals -->
  <circle cx="132" cy="26" r="1.5" fill="#DF9F3E"/>
  <circle cx="174" cy="68" r="1.5" fill="#DF9F3E"/>
  <circle cx="174" cy="132" r="1.5" fill="#DF9F3E"/>
  <circle cx="132" cy="174" r="1.5" fill="#DF9F3E"/>
  <circle cx="68" cy="174" r="1.5" fill="#DF9F3E"/>
  <circle cx="26" cy="132" r="1.5" fill="#DF9F3E"/>
  <circle cx="26" cy="68" r="1.5" fill="#DF9F3E"/>
  <circle cx="68" cy="26" r="1.5" fill="#DF9F3E"/>

  <!-- SELO text on top arc -->
  <text font-family="Montserrat, sans-serif" font-weight="500" font-size="9" letter-spacing="0.3em" fill="#DF9F3E">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">SELO</textPath>
  </text>
  <path id="topArc" d="M30 100 A70 70 0 0 1 170 100" fill="none"/>

  <!-- ZNITH center wordmark -->
  <text x="100" y="106" font-family="Cinzel, serif" font-weight="600" font-size="32" letter-spacing="0.1em" text-anchor="middle" fill="#FFFFFF">ZNITH</text>

  <!-- Year below -->
  <text x="100" y="126" font-family="Montserrat, sans-serif" font-weight="400" font-size="10" letter-spacing="0.2em" text-anchor="middle" fill="rgba(255,255,255,0.5)">2026</text>

  <!-- Thin gold separator lines -->
  <line x1="55" y1="85" x2="145" y2="85" stroke="#DF9F3E" stroke-width="0.5" opacity="0.6"/>
  <line x1="65" y1="132" x2="135" y2="132" stroke="#DF9F3E" stroke-width="0.5" opacity="0.6"/>

  <!-- Bottom arc text -->
  <text font-family="Montserrat, sans-serif" font-weight="400" font-size="7" letter-spacing="0.25em" fill="rgba(255,255,255,0.5)">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">ARQUITETURA COMERCIAL</textPath>
  </text>
  <path id="bottomArc" d="M35 120 A70 70 0 0 0 165 120" fill="none"/>
</svg>
