<!-- ZNITH Consulting Sub-brand Lockup -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 70">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@300&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300&amp;display=swap');
    </style>
  </defs>
  <!-- ZNITH in Cinzel SemiBold -->
  <text x="0" y="38" font-family="Cinzel, serif" font-weight="300" font-size="38" letter-spacing="0.1em" fill="#FFFFFF">ZNITH</text>
  <!-- CONSULTING in Montserrat Light, wide tracking -->
  <text x="2" y="60" font-family="Montserrat, sans-serif" font-weight="300" font-size="14" letter-spacing="0.35em" fill="rgba(255,255,255,0.7)">CONSULTING</text>
</svg>
