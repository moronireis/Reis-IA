<!-- "Uma iniciativa ZNITH" Endorsement Lockup -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 50">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@300&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300&amp;display=swap');
    </style>
  </defs>
  <!-- Thin gold line above -->
  <line x1="0" y1="0" x2="260" y2="0" stroke="#DF9F3E" stroke-width="0.5" opacity="0.5"/>
  <!-- "Uma iniciativa" in Montserrat Light -->
  <text x="130" y="20" font-family="Montserrat, sans-serif" font-weight="300" font-size="10" letter-spacing="0.2em" text-anchor="middle" fill="rgba(255,255,255,0.6)">UMA INICIATIVA</text>
  <!-- ZNITH in Cinzel -->
  <text x="130" y="42" font-family="Cinzel, serif" font-weight="300" font-size="24" letter-spacing="0.12em" text-anchor="middle" fill="#FFFFFF">ZNITH</text>
</svg>
