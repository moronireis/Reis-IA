<!-- Grafismo — Gold Accent Line (horizontal divider with center fade) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 4">
  <defs>
    <linearGradient id="goldFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DF9F3E" stop-opacity="0"/>
      <stop offset="30%" stop-color="#DF9F3E" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#DF9F3E" stop-opacity="1"/>
      <stop offset="70%" stop-color="#DF9F3E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#DF9F3E" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <line x1="0" y1="2" x2="400" y2="2" stroke="url(#goldFade)" stroke-width="0.8"/>
</svg>
