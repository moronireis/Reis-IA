<!-- Selo de Governo — Lideres Leoes Achievement Badge -->
<!-- Compact circular badge for profile pictures, social media -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&amp;display=swap');
    </style>
  </defs>

  <!-- Outer ring — gold -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="#DF9F3E" stroke-width="1.2"/>

  <!-- Inner fill — deep navy -->
  <circle cx="60" cy="60" r="52" fill="#091022"/>
  <circle cx="60" cy="60" r="52" fill="none" stroke="#DF9F3E" stroke-width="0.5"/>

  <!-- Crown symbol — centered, geometric, three points -->
  <g transform="translate(60,38)" fill="none" stroke="#DF9F3E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Crown base -->
    <path d="M-16 8 L-16 0 L-10 -8 L-4 0 L0 -12 L4 0 L10 -8 L16 0 L16 8 Z"/>
    <!-- Crown base band -->
    <line x1="-16" y1="8" x2="16" y2="8"/>
    <!-- Crown jewel dots -->
    <circle cx="-10" cy="-2" r="1" fill="#DF9F3E"/>
    <circle cx="0" cy="-6" r="1" fill="#DF9F3E"/>
    <circle cx="10" cy="-2" r="1" fill="#DF9F3E"/>
  </g>

  <!-- SELO DE text on top arc -->
  <text font-family="Montserrat, sans-serif" font-weight="400" font-size="6.5" letter-spacing="0.3em" fill="rgba(255,255,255,0.6)">
    <textPath href="#govTopArc" startOffset="50%" text-anchor="middle">SELO DE</textPath>
  </text>
  <path id="govTopArc" d="M18 55 A42 42 0 0 1 102 55" fill="none"/>

  <!-- GOVERNO text on bottom arc -->
  <text font-family="Montserrat, sans-serif" font-weight="600" font-size="8" letter-spacing="0.25em" fill="#DF9F3E">
    <textPath href="#govBottomArc" startOffset="50%" text-anchor="middle">GOVERNO</textPath>
  </text>
  <path id="govBottomArc" d="M22 72 A42 42 0 0 0 98 72" fill="none"/>

  <!-- Small divider dots -->
  <circle cx="20" cy="60" r="1" fill="#DF9F3E" opacity="0.6"/>
  <circle cx="100" cy="60" r="1" fill="#DF9F3E" opacity="0.6"/>
</svg>
