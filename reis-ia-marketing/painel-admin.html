<html lang="pt-BR">
<head>

  <meta name="robots" content="noindex, nofollow" />
  <title>Painel Admin — Reis Marketing IA</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='3' fill='%234A90FF'/%3E%3Cg fill='none' stroke='%23000000' stroke-width='7' stroke-linecap='round' stroke-linejoin='round'%3E%3Cline x1='14' y1='8' x2='50' y2='8'/%3E%3Cline x1='50' y1='8' x2='14' y2='56'/%3E%3Cline x1='14' y1='8' x2='25' y2='25'/%3E%3Cline x1='39' y1='39' x2='50' y2='56'/%3E%3Cline x1='14' y1='56' x2='50' y2='56'/%3E%3C/g%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent-blue: #4A90FF;
      --accent-blue-hover: #6AADFF;
      --surface-0: #000000;
      --surface-1: #0A0A0A;
      --surface-2: #111111;
      --surface-3: #161616;
      --surface-4: #1A1A1A;
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.70);
      --text-tertiary: rgba(255, 255, 255, 0.50);
      --text-quaternary: rgba(255, 255, 255, 0.35);
      --border-default: rgba(255, 255, 255, 0.08);
      --border-visible: rgba(255, 255, 255, 0.12);
      --border-strong: rgba(255, 255, 255, 0.20);
      --radius: 8px;
      --radius-xl: 12px;
      --radius-full: 9999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; background: var(--surface-0); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
    body { min-height: 100vh; background: var(--surface-0); overflow-x: hidden; }
    ::selection { background: rgba(74, 144, 255, 0.30); color: white; }

    /* Grain */
    body::after { content: ""; position: fixed; inset: 0; pointer-events: none; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E"); z-index: 9999; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 clamp(20px, 5vw, 48px); }

    /* Header */
    .admin-header {
      padding: 100px 0 40px;
      border-bottom: 1px solid var(--border-default);
      margin-bottom: 32px;
    }
    .admin-header h1 { font-size: clamp(1.5rem, 1rem + 2vw, 2.5rem); font-weight: 700; letter-spacing: -0.025em; margin-bottom: 8px; }
    .admin-header p { color: var(--text-tertiary); font-size: 0.875rem; }

    /* Nav bar */
    .admin-nav {
      position: fixed; top: 0; left: 0; right: 0; height: 64px;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-default);
      z-index: 50; display: flex; align-items: center;
    }
    .admin-nav .container { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .admin-nav-brand { display: flex; align-items: center; gap: 10px; color: var(--text-primary); font-weight: 300; font-size: 1rem; text-decoration: none; }
    .admin-nav-brand svg { color: var(--accent-blue); }
    .admin-nav-links { display: flex; gap: 12px; }
    .admin-nav-links a { color: var(--text-tertiary); font-size: 0.8125rem; text-decoration: none; transition: color 0.2s; }
    .admin-nav-links a:hover { color: var(--text-primary); }

    /* Tabs */
    .tab-bar {
      display: flex; gap: 0; margin-bottom: 32px;
      border: 1px solid var(--border-default); border-radius: var(--radius-xl); overflow: hidden;
    }
    .tab-btn {
      flex: 1; padding: 14px 20px; font-size: 0.875rem; font-weight: 600;
      background: var(--surface-2); color: var(--text-tertiary);
      border: none; cursor: pointer; transition: all 0.2s; font-family: inherit;
      text-align: center; position: relative;
    }
    .tab-btn:not(:last-child) { border-right: 1px solid var(--border-default); }
    .tab-btn:hover { color: var(--text-secondary); background: var(--surface-3); }
    .tab-btn.active { background: rgba(74,144,255,0.1); color: var(--accent-blue); }
    .tab-btn .tab-count {
      display: inline-block; background: rgba(255,255,255,0.08); padding: 2px 8px;
      border-radius: var(--radius-full); font-size: 0.6875rem; margin-left: 6px;
      font-weight: 700;
    }
    .tab-btn.active .tab-count { background: rgba(74,144,255,0.2); }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--surface-2); border: 1px solid var(--border-default);
      border-radius: var(--radius-xl); padding: 20px; text-align: center;
    }
    .stat-card .num { font-size: 1.75rem; font-weight: 700; color: var(--accent-blue); }
    .stat-card .label { font-size: 0.75rem; color: var(--text-tertiary); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }

    /* Filters */
    .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-btn {
      padding: 8px 16px; font-size: 0.8125rem; font-weight: 500;
      background: var(--surface-2); color: var(--text-secondary);
      border: 1px solid var(--border-default); border-radius: var(--radius-full);
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--border-visible); color: var(--text-primary); }
    .filter-btn.active { background: rgba(74,144,255,0.15); border-color: rgba(74,144,255,0.30); color: var(--accent-blue); }

    /* Search bar */
    .search-bar {
      width: 100%; padding: 12px 16px; font-size: 0.875rem;
      background: var(--surface-2); color: var(--text-primary);
      border: 1px solid var(--border-default); border-radius: var(--radius);
      font-family: inherit; margin-bottom: 24px; transition: border-color 0.2s;
    }
    .search-bar::placeholder { color: var(--text-quaternary); }
    .search-bar:focus { outline: none; border-color: var(--accent-blue); }

    /* Actions bar */
    .actions { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .action-btn {
      padding: 10px 20px; font-size: 0.8125rem; font-weight: 600;
      background: var(--surface-3); color: var(--text-primary);
      border: 1px solid var(--border-default); border-radius: var(--radius);
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .action-btn:hover { border-color: var(--border-visible); background: var(--surface-4); }
    .action-btn.danger { color: #EF4444; border-color: rgba(239,68,68,0.25); }
    .action-btn.danger:hover { background: rgba(239,68,68,0.1); }

    /* Submission card */
    .submission-card {
      background: var(--surface-2); border: 1px solid var(--border-default);
      border-radius: var(--radius-xl); padding: 24px; margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .submission-card:hover { border-color: var(--border-visible); }
    .submission-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .submission-type {
      display: inline-flex; padding: 4px 12px; border-radius: var(--radius-full);
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .type-personal-branding { background: rgba(168,85,247,0.15); color: #C084FC; border: 1px solid rgba(168,85,247,0.25); }
    .type-movimento { background: rgba(249,115,22,0.15); color: #FB923C; border: 1px solid rgba(249,115,22,0.25); }
    .type-empresa { background: rgba(34,197,94,0.15); color: #4ADE80; border: 1px solid rgba(34,197,94,0.25); }
    .type-produto { background: rgba(74,144,255,0.15); color: #93C5FD; border: 1px solid rgba(74,144,255,0.25); }
    .type-diagnostico { background: rgba(236,72,153,0.15); color: #F472B6; border: 1px solid rgba(236,72,153,0.25); }

    /* Lista badges */
    .type-lista { background: rgba(251,191,36,0.15); color: #FCD34D; border: 1px solid rgba(251,191,36,0.25); }
    .type-mdv { background: rgba(16,185,129,0.15); color: #34D399; border: 1px solid rgba(16,185,129,0.25); }

    .submission-date { font-size: 0.75rem; color: var(--text-quaternary); }
    .submission-name { font-size: 1.125rem; font-weight: 600; margin-bottom: 12px; }

    .submission-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 640px) { .submission-fields { grid-template-columns: 1fr; } }

    .field { background: var(--surface-3); border-radius: var(--radius); padding: 12px; }
    .field-label { font-size: 0.6875rem; color: var(--text-quaternary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
    .field-value { font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.5; word-break: break-word; }
    .field-value:empty::after { content: '—'; color: var(--text-quaternary); }
    .field.full { grid-column: 1 / -1; }

    /* Tags */
    .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .tag {
      display: inline-flex; padding: 3px 10px; border-radius: var(--radius-full);
      font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.02em;
    }
    .tag-duplicado { background: rgba(239,68,68,0.15); color: #F87171; border: 1px solid rgba(239,68,68,0.20); }
    .tag-comprador { background: rgba(34,197,94,0.15); color: #4ADE80; border: 1px solid rgba(34,197,94,0.20); }
    .tag-aluno { background: rgba(59,130,246,0.15); color: #60A5FA; border: 1px solid rgba(59,130,246,0.20); }
    .tag-exportado { background: rgba(168,85,247,0.15); color: #C084FC; border: 1px solid rgba(168,85,247,0.20); }
    .tag-source { background: rgba(251,191,36,0.12); color: #FCD34D; border: 1px solid rgba(251,191,36,0.18); }
    .tag-mdv { background: rgba(16,185,129,0.12); color: #34D399; border: 1px solid rgba(16,185,129,0.18); }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 80px 20px;
      color: var(--text-tertiary);
    }
    .empty-state h3 { color: var(--text-secondary); margin-bottom: 8px; }

    /* Toggle detail */
    .toggle-detail {
      font-size: 0.8125rem; color: var(--accent-blue); background: none; border: none;
      cursor: pointer; font-family: inherit; padding: 8px 0; margin-top: 8px;
    }
    .toggle-detail:hover { color: var(--accent-blue-hover); }
    .submission-detail { display: none; margin-top: 16px; }
    .submission-detail.open { display: block; }

    .btn-delete {
      background: none; border: 1px solid rgba(239,68,68,0.25); color: #EF4444;
      font-size: 0.75rem; font-weight: 500; padding: 5px 12px; border-radius: var(--radius-full);
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.4); }

    .btn-tag-toggle {
      background: none; border: 1px solid var(--border-default); color: var(--text-tertiary);
      font-size: 0.75rem; font-weight: 500; padding: 5px 12px; border-radius: var(--radius-full);
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .btn-tag-toggle:hover { border-color: var(--border-visible); color: var(--text-primary); }
    .btn-tag-toggle.tagged { border-color: rgba(168,85,247,0.30); color: #C084FC; background: rgba(168,85,247,0.08); }

    /* Pagination */
    .pagination {
      display: flex; justify-content: center; gap: 8px; padding: 32px 0;
    }
    .page-btn {
      padding: 8px 14px; font-size: 0.8125rem; font-weight: 500;
      background: var(--surface-2); color: var(--text-secondary);
      border: 1px solid var(--border-default); border-radius: var(--radius);
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .page-btn:hover { border-color: var(--border-visible); color: var(--text-primary); }
    .page-btn.active { background: rgba(74,144,255,0.15); border-color: rgba(74,144,255,0.30); color: var(--accent-blue); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface-0); }
    ::-webkit-scrollbar-thumb { background: var(--border-visible); border-radius: 3px; }
  </style>
</head>

  <script>
    let allSubmissions = [];
    let currentTab = 'novos';
    let currentFilter = 'all';
    let searchQuery = '';
    let currentPage = 1;
    const PAGE_SIZE = 50;

    // Form types that are "new" leads (from intake forms)
    const NEW_FORM_TYPES = ['personal-branding', 'movimento', 'empresa', 'produto', 'diagnostico'];

    async function fetchSubmissions() {
      try {
        const res = await fetch('/api/submissions');
        if (!res.ok) throw new Error('API error');
        allSubmissions = await res.json();
      } catch (err) {
        console.error('Fetch error:', err);
        allSubmissions = [];
      }
    }

    function isListaLead(sub) {
      return sub.form_type && sub.form_type.startsWith('lista-');
    }

    function isMdvLead(sub) {
      return sub.form_type && sub.form_type.startsWith('mdv-');
    }

    function isNewLead(sub) {
      return NEW_FORM_TYPES.includes(sub.form_type);
    }

    function getTabSubmissions() {
      if (currentTab === 'novos') return allSubmissions.filter(isNewLead);
      if (currentTab === 'mdv') return allSubmissions.filter(isMdvLead);
      if (currentTab === 'listas') return allSubmissions.filter(isListaLead);
      return allSubmissions;
    }

    function getFilteredSubmissions() {
      let subs = getTabSubmissions();

      // Filter
      if (currentFilter !== 'all') {
        if (currentFilter === 'duplicado') {
          subs = subs.filter(s => (s.data?.tags || []).includes('duplicado'));
        } else if (currentFilter === 'exportado') {
          subs = subs.filter(s => (s.data?.tags || []).includes('exportado'));
        } else if (currentFilter === 'comprador') {
          subs = subs.filter(s => (s.data?.tags || []).includes('comprador'));
        } else if (currentFilter === 'aluno') {
          subs = subs.filter(s => (s.data?.tags || []).includes('aluno'));
        } else {
          subs = subs.filter(s => s.form_type === currentFilter);
        }
      }

      // Search
      if (searchQuery.trim()) {
        const q = searchQuery.toLowerCase().trim();
        subs = subs.filter(s => {
          const name = (s.name || '').toLowerCase();
          const email = (s.data?.email || '').toLowerCase();
          const phone = (s.data?.phone || '').toLowerCase();
          const insta = (s.data?.instagram || '').toLowerCase();
          return name.includes(q) || email.includes(q) || phone.includes(q) || insta.includes(q);
        });
      }

      return subs;
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function typeLabel(type) {
      const labels = {
        'personal-branding': 'Personal Branding',
        'movimento': 'Movimento',
        'empresa': 'Empresa',
        'produto': 'Produto',
        'diagnostico': 'Diagnostico'
      };
      if (type.startsWith('mdv-')) {
        const slug = type.replace('mdv-', '');
        const names = { 'compradores': 'MDV Compradores', 'onboarding': 'MDV Onboarding' };
        return names[slug] || 'MDV ' + slug.replace(/-/g, ' ');
      }
      if (type.startsWith('lista-')) {
        return type.replace('lista-', '').replace(/-/g, ' ');
      }
      return labels[type] || type;
    }

    function typeClass(type) {
      if (NEW_FORM_TYPES.includes(type)) return `type-${type}`;
      if (type.startsWith('mdv-')) return 'type-mdv';
      return 'type-lista';
    }

        promessa: 'Promessa', personalidade: 'Personalidade', tom: 'Tom',
        nao_somos: 'Nao somos', estilo_visual: 'Estilo visual',
        referencias_visuais: 'Referencias visuais', modo: 'Modo visual',
        logo_atual: 'Logo atual', objetivo_12m: 'Objetivo 12m',
        objetivo_marca: 'Objetivo da marca', visao_5_anos: 'Visao 5 anos',
        historia: 'Historia', estado_marca: 'Estado da marca',
        tipo_produto: 'Tipo', empresa_mae: 'Empresa-mae', preco: 'Preco',
        duracao: 'Duracao', fase: 'Fase', cliente_antes: 'Cliente antes',
        cliente_depois: 'Cliente depois', provas: 'Provas', icp: 'ICP',
        nao_para: 'Nao e para', decisor: 'Decisor',
        satisfeito_nome: 'Satisfeito com nome', ideias_nomes: 'Ideias de nomes',
        sensacao_nome: 'Sensacao do nome', idioma_nome: 'Idioma do nome',
        relacao_marca: 'Relacao com marca-mae', modulos: 'Modulos',
        entregaveis: 'Entregaveis', garantia: 'Garantia', escassez: 'Escassez',
        bonus: 'Bonus', processo_venda: 'Processo de venda',
        posicionamento_visual: 'Posicionamento visual', referencias: 'Referencias',
        onboarding: 'Onboarding', certificacao: 'Certificacao'
      };
      return labels[key] || key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function renderStats() {
      const tabSubs = getTabSubmissions();
      const filtered = getFilteredSubmissions();

      if (currentTab === 'novos') {
        const counts = { total: tabSubs.length, 'personal-branding': 0, movimento: 0, empresa: 0, produto: 0, diagnostico: 0 };
        tabSubs.forEach(s => { if (counts[s.form_type] !== undefined) counts[s.form_type]++; });
        document.getElementById('stats-row').innerHTML = `
          <div class="stat-card"><div class="num">${counts.total}</div><div class="label">Total Novos</div></div>
          <div class="stat-card"><div class="num">${counts['personal-branding']}</div><div class="label">Personal</div></div>
          <div class="stat-card"><div class="num">${counts.movimento}</div><div class="label">Movimento</div></div>
          <div class="stat-card"><div class="num">${counts.empresa}</div><div class="label">Empresa</div></div>
          <div class="stat-card"><div class="num">${counts.produto}</div><div class="label">Produto</div></div>
          <div class="stat-card"><div class="num">${counts.diagnostico}</div><div class="label">Diagnostico</div></div>
        `;
      } else if (currentTab === 'mdv') {
        const mdvBySource = {};
        let mdvDupCount = 0;
        let mdvExportedCount = 0;
        tabSubs.forEach(s => {
          const source = s.data?.source_list || s.form_type;
          mdvBySource[source] = (mdvBySource[source] || 0) + 1;
          if ((s.data?.tags || []).includes('duplicado')) mdvDupCount++;
          if ((s.data?.tags || []).includes('exportado')) mdvExportedCount++;
        });
        const mdvSourceCards = Object.entries(mdvBySource)
          .sort((a, b) => b[1] - a[1])
          .map(([source, count]) => `<div class="stat-card"><div class="num">${count}</div><div class="label">${escapeHtml(source.substring(0, 25))}</div></div>`)
          .join('');
        document.getElementById('stats-row').innerHTML = `
          <div class="stat-card"><div class="num">${tabSubs.length}</div><div class="label">Total MDV</div></div>
          <div class="stat-card"><div class="num">${mdvDupCount}</div><div class="label">Duplicados</div></div>
          <div class="stat-card"><div class="num">${mdvExportedCount}</div><div class="label">Exportados</div></div>
          ${mdvSourceCards}
        `;
      } else if (currentTab === 'listas') {
        // Group by source list
        const bySource = {};
        let dupCount = 0;
        let exportedCount = 0;
        tabSubs.forEach(s => {
          const source = s.data?.source_list || s.form_type;
          bySource[source] = (bySource[source] || 0) + 1;
          if ((s.data?.tags || []).includes('duplicado')) dupCount++;
          if ((s.data?.tags || []).includes('exportado')) exportedCount++;
        });

        const sourceCards = Object.entries(bySource)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 5)
          .map(([source, count]) => `<div class="stat-card"><div class="num">${count}</div><div class="label">${escapeHtml(source.substring(0, 25))}</div></div>`)
          .join('');

        document.getElementById('stats-row').innerHTML = `
          <div class="stat-card"><div class="num">${tabSubs.length}</div><div class="label">Total Listas</div></div>
          <div class="stat-card"><div class="num">${dupCount}</div><div class="label">Duplicados</div></div>
          <div class="stat-card"><div class="num">${exportedCount}</div><div class="label">Exportados</div></div>
          ${sourceCards}
        `;
      } else {
        const newCount = allSubmissions.filter(isNewLead).length;
        const mdvCount = allSubmissions.filter(isMdvLead).length;
        const listaCount = allSubmissions.filter(isListaLead).length;
        const dupCount = allSubmissions.filter(s => (s.data?.tags || []).includes('duplicado')).length;
        document.getElementById('stats-row').innerHTML = `
          <div class="stat-card"><div class="num">${allSubmissions.length}</div><div class="label">Total Geral</div></div>
          <div class="stat-card"><div class="num">${newCount}</div><div class="label">Leads Novos</div></div>
          <div class="stat-card"><div class="num">${mdvCount}</div><div class="label">Leads MDV</div></div>
          <div class="stat-card"><div class="num">${listaCount}</div><div class="label">Listas Antigas</div></div>
          <div class="stat-card"><div class="num">${dupCount}</div><div class="label">Duplicados</div></div>
        `;
      }
    }

    function renderFilters() {
      const tabSubs = getTabSubmissions();
      let filterHtml = '<button class="filter-btn active" data-filter="all">Todos</button>';

      if (currentTab === 'novos') {
        filterHtml += `
          <button class="filter-btn" data-filter="personal-branding">Personal Branding</button>
          <button class="filter-btn" data-filter="movimento">Movimento</button>
          <button class="filter-btn" data-filter="empresa">Empresa</button>
          <button class="filter-btn" data-filter="produto">Produto</button>
          <button class="filter-btn" data-filter="diagnostico">Diagnostico</button>
        `;
      } else if (currentTab === 'mdv') {
        const mdvTypes = new Set();
        tabSubs.forEach(s => mdvTypes.add(s.form_type));
        [...mdvTypes].sort().forEach(t => {
          const label = typeLabel(t);
          const count = tabSubs.filter(s => s.form_type === t).length;
          filterHtml += `<button class="filter-btn" data-filter="${t}">${escapeHtml(label)} (${count})</button>`;
        });
        filterHtml += `
          <button class="filter-btn" data-filter="duplicado">Duplicados</button>
          <button class="filter-btn" data-filter="exportado">Exportados</button>
          <button class="filter-btn" data-filter="comprador">Compradores</button>
        `;
      } else if (currentTab === 'listas') {
        // Get unique lista form types
        const types = new Set();
        tabSubs.forEach(s => types.add(s.form_type));
        const sorted = [...types].sort();
        sorted.forEach(t => {
          const label = typeLabel(t);
          const count = tabSubs.filter(s => s.form_type === t).length;
          filterHtml += `<button class="filter-btn" data-filter="${t}">${escapeHtml(label)} (${count})</button>`;
        });
        filterHtml += `
          <button class="filter-btn" data-filter="duplicado">Duplicados</button>
          <button class="filter-btn" data-filter="exportado">Exportados</button>
          <button class="filter-btn" data-filter="comprador">Compradores</button>
          <button class="filter-btn" data-filter="aluno">Alunos</button>
        `;
      } else {
        filterHtml += `
          <button class="filter-btn" data-filter="duplicado">Duplicados</button>
          <button class="filter-btn" data-filter="exportado">Exportados</button>
          <button class="filter-btn" data-filter="comprador">Compradores</button>
          <button class="filter-btn" data-filter="aluno">Alunos</button>
        `;
      }

      document.getElementById('filters').innerHTML = filterHtml;

      // Re-bind events
      document.querySelectorAll('#filters .filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#filters .filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentFilter = btn.dataset.filter;
          currentPage = 1;
          renderSubmissions();
        });
      });
    }

    function renderSubmissions() {
      const filtered = getFilteredSubmissions();
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      if (currentPage > totalPages) currentPage = totalPages;

      const start = (currentPage - 1) * PAGE_SIZE;
      const paged = filtered.slice(start, start + PAGE_SIZE);

      const list = document.getElementById('submissions-list');

      if (paged.length === 0) {
        list.innerHTML = `<div class="empty-state"><h3>Nenhum lead encontrado</h3><p>Ajuste os filtros ou busca.</p></div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      list.innerHTML = paged.map((sub, pageIdx) => {
        const globalIdx = start + pageIdx;
        const data = sub.data || {};
        const tags = data.tags || [];
        const isLista = isListaLead(sub);

        // Decide which fields to show at top
        const skipKeys = ['tags', 'imported_at', 'source_list', 'original_date', 'tipo_lista'];
        const topKeys = ['email', 'phone', 'instagram'];
        const topFields = topKeys.map(k => [k, data[k]]).filter(([, v]) => v);
        if (isLista && data.source_list) {
          topFields.push(['source_list', data.source_list]);
        }

        const allFields = Object.entries(data).filter(([k]) => !skipKeys.includes(k) && k !== 'tags');

        // Tag badges
        const tagBadges = tags.map(t => {
          if (t === 'duplicado') return '<span class="tag tag-duplicado">DUPLICADO</span>';
          if (t === 'exportado') return '<span class="tag tag-exportado">EXPORTADO</span>';
          if (t === 'comprador') return '<span class="tag tag-comprador">COMPRADOR</span>';
          if (t === 'aluno') return '<span class="tag tag-aluno">ALUNO</span>';
          if (t === 'mdv') return '<span class="tag tag-mdv">MDV</span>';
          return `<span class="tag tag-source">${escapeHtml(t.toUpperCase())}</span>`;
        }).join('');

        const sourceLabel = isLista && data.source_list
          ? `<span class="tag tag-source">${escapeHtml(data.source_list)}</span>`
          : '';

        const isExported = tags.includes('exportado');

        return `
          <div class="submission-card">
            <div class="submission-header">
              <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                <span class="submission-type ${typeClass(sub.form_type)}">${escapeHtml(typeLabel(sub.form_type))}</span>
                ${sourceLabel}
              </div>
              <div style="display: flex; align-items: center; gap: 10px;">
                <span class="submission-date">${formatDate(isLista ? (data.original_date || sub.created_at) : sub.created_at)}</span>
                <button class="btn-tag-toggle ${isExported ? 'tagged' : ''}" onclick="toggleExported('${sub.id}', this)">${isExported ? 'Exportado' : 'Marcar exportado'}</button>
                <button class="btn-delete" onclick="deleteSubmission('${sub.id}')">Excluir</button>
              </div>
            </div>
            ${tagBadges ? `<div class="tag-row">${tagBadges}</div>` : ''}
            <div class="submission-name">${escapeHtml(sub.name || 'Sem nome')}</div>
            <div class="submission-fields">
              ${topFields.map(([k, v]) => `
                <div class="field">
                  <div class="field-label">${fieldLabel(k)}</div>
                  <div class="field-value">${escapeHtml(Array.isArray(v) ? v.join(', ') : (v || ''))}</div>
                </div>
              `).join('')}
            </div>
            ${allFields.length > topFields.length ? `
              <button class="toggle-detail" onclick="toggleDetail(${globalIdx})">Ver todos os campos (${allFields.length})</button>
              <div class="submission-detail" id="detail-${globalIdx}">
                <div class="submission-fields">
                  ${allFields.map(([k, v]) => {
                    const val = Array.isArray(v) ? v.join(', ') : (v || '');
                    const isLong = val.length > 100;
                    return `
                      <div class="field${isLong ? ' full' : ''}">
                        <div class="field-label">${fieldLabel(k)}</div>
                        <div class="field-value">${escapeHtml(val)}</div>
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');

      // Pagination
      renderPagination(filtered.length, totalPages);
    }

    function renderPagination(total, totalPages) {
      if (totalPages <= 1) {
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      let html = `<button class="page-btn" ${currentPage <= 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">Anterior</button>`;

      const maxVisible = 7;
      let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
      let endPage = Math.min(totalPages, startPage + maxVisible - 1);
      if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);

      for (let i = startPage; i <= endPage; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }

      html += `<button class="page-btn" ${currentPage >= totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">Proximo</button>`;
      html += `<span style="color: var(--text-quaternary); font-size: 0.75rem; align-self: center; margin-left: 8px;">${total} leads</span>`;

      document.getElementById('pagination').innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      renderSubmissions();
      window.scrollTo({ top: 300, behavior: 'smooth' });
    }

    function toggleDetail(index) {
      const detail = document.getElementById(`detail-${index}`);
      if (!detail) return;
      detail.classList.toggle('open');
      const btn = detail.previousElementSibling;
      btn.textContent = detail.classList.contains('open') ? 'Fechar detalhes' : 'Ver todos os campos';
    }

    // Toggle "exportado" tag on a submission
    async function toggleExported(id, btn) {
      const sub = allSubmissions.find(s => s.id === id);
      if (!sub) return;

      const tags = sub.data?.tags || [];
      const isExported = tags.includes('exportado');
      const newTags = isExported ? tags.filter(t => t !== 'exportado') : [...tags, 'exportado'];

      const newData = { ...sub.data, tags: newTags };

      try {
        const res = await fetch(`/api/update-lead`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, data: newData })
        });
        if (res.ok) {
          sub.data = newData;
          btn.classList.toggle('tagged');
          btn.textContent = !isExported ? 'Exportado' : 'Marcar exportado';
          renderStats();
        }
      } catch (err) { console.error('Toggle exported error:', err); }
    }

    // Bulk mark as exported
    document.getElementById('btn-mark-exported').addEventListener('click', async () => {
      const filtered = getFilteredSubmissions();
      const toMark = filtered.filter(s => !(s.data?.tags || []).includes('exportado'));
      if (toMark.length === 0) return alert('Nenhum lead para marcar.');
      if (!confirm(`Marcar ${toMark.length} leads como exportado?`)) return;

      let done = 0;
      for (const sub of toMark) {
        const newTags = [...(sub.data?.tags || []), 'exportado'];
        const newData = { ...sub.data, tags: newTags };
        try {
          const res = await fetch('/api/update-lead', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: sub.id, data: newData })
          });
          if (res.ok) {
            sub.data = newData;
            done++;
          }
        } catch (err) { console.error(err); }
      }

      alert(`${done} leads marcados como exportado.`);
      renderStats();
      renderSubmissions();
    });

    // Tabs
    document.querySelector('.tab-bar').addEventListener('click', (e) => {
      if (!e.target.classList.contains('tab-btn')) return;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentTab = e.target.dataset.tab;
      currentFilter = 'all';
      currentPage = 1;
      renderStats();
      renderFilters();
      renderSubmissions();
    });

    // Search
    let searchTimeout;
    document.getElementById('search-bar').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        searchQuery = e.target.value;
        currentPage = 1;
        renderSubmissions();
      }, 300);
    });

    // Export JSON
    document.getElementById('btn-export-json').addEventListener('click', () => {
      const filtered = getFilteredSubmissions();
      const blob = new Blob([JSON.stringify(filtered, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `reis-leads-${currentTab}-${currentFilter}-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // Export CSV
    document.getElementById('btn-export-csv').addEventListener('click', () => {
      const filtered = getFilteredSubmissions();
      if (!filtered.length) return;

      const allKeys = new Set();
      filtered.forEach(s => Object.keys(s.data || {}).forEach(k => { if (k !== 'tags') allKeys.add(k); }));
      const keys = ['form_type', 'name', 'created_at', ...allKeys];

      const esc = (val) => `"${String(val || '').replace(/"/g, '""')}"`;
      const rows = [keys.map(k => esc(fieldLabel(k))).join(',')];
      filtered.forEach(s => {
        const row = keys.map(k => {
          if (k === 'form_type') return esc(s.form_type);
          if (k === 'name') return esc(s.name);
          if (k === 'created_at') return esc(s.created_at);
          const val = s.data?.[k];
          return esc(Array.isArray(val) ? val.join(', ') : val);
        });
        rows.push(row.join(','));
      });

      const blob = new Blob(['\ufeff' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `reis-leads-${currentTab}-${currentFilter}-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // Delete single submission
    async function deleteSubmission(id) {
      if (!confirm('Excluir este lead?')) return;
      try {
        const res = await fetch(`/api/delete?id=${id}`, { method: 'DELETE' });
        if (res.ok) {
          allSubmissions = allSubmissions.filter(s => s.id !== id);
          renderTabCounts();
          renderStats();
          renderSubmissions();
        }
      } catch (err) { console.error('Delete error:', err); }
    }

    // Clear all
    document.getElementById('btn-clear').addEventListener('click', async () => {
      const filtered = getTabSubmissions();
      const label = currentTab === 'novos' ? 'leads novos' : currentTab === 'listas' ? 'listas antigas' : 'TODOS os leads';
      if (!confirm(`Apagar ${filtered.length} ${label}? Esta acao nao pode ser desfeita.`)) return;
      for (const s of filtered) {
        await fetch(`/api/delete?id=${s.id}`, { method: 'DELETE' });
      }
      await fetchSubmissions();
      renderTabCounts();
      renderStats();
      renderFilters();
      renderSubmissions();
    });

    function renderTabCounts() {
      document.getElementById('tab-count-novos').textContent = allSubmissions.filter(isNewLead).length;
      document.getElementById('tab-count-mdv').textContent = allSubmissions.filter(isMdvLead).length;
      document.getElementById('tab-count-listas').textContent = allSubmissions.filter(isListaLead).length;
      document.getElementById('tab-count-todos').textContent = allSubmissions.length;
    }

    // Initial render
    async function init() {
      document.getElementById('submissions-list').innerHTML = '<div class="empty-state"><h3>Carregando...</h3></div>';
      await fetchSubmissions();
      renderTabCounts();
      renderStats();
      renderFilters();
      renderSubmissions();
    }
    init();

    // Auto-refresh every 60 seconds
    setInterval(async () => {
      await fetchSubmissions();
      renderTabCounts();
      renderStats();
      renderSubmissions();
    }, 60000);
  </script>
</body>
</html>
