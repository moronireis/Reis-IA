<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <rect width="600" height="600" fill="#000000"/>

  <!-- Aurora -->
  <ellipse cx="300" cy="200" rx="350" ry="250" fill="rgba(74,144,255,0.06)"/>

  <!-- Badge -->
  <rect x="160" y="70" width="280" height="32" rx="16" fill="rgba(74,144,255,0.1)" stroke="rgba(74,144,255,0.25)" stroke-width="1"/>
  <text x="300" y="91" text-anchor="middle" fill="#4A90FF" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Imersão Online · 26 de Março, 19h</text>

  <!-- MDV Logo -->
  <text x="300" y="185" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" letter-spacing="-0.03em">MDV</text>
  <rect x="250" y="197" width="100" height="3" rx="1.5" fill="#4A90FF"/>
  <text x="300" y="228" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" letter-spacing="0.15em">IMERSÃO IA</text>

  <!-- Subtitle -->
  <text x="300" y="275" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="400">Agentes de IA que montam sua</text>
  <text x="300" y="298" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="400">operação de vendas do zero.</text>

  <!-- +700K -->
  <line x1="100" y1="330" x2="500" y2="330" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="300" y="385" text-anchor="middle" fill="#4A90FF" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800">+R$ 700K</text>
  <text x="300" y="410" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-family="Inter, system-ui, sans-serif" font-size="12">em contratos gerados pela comunidade</text>
  <line x1="100" y1="435" x2="500" y2="435" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Price CTA -->
  <rect x="150" y="460" width="300" height="52" rx="26" fill="#4A90FF"/>
  <text x="300" y="492" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Garantir vaga — R$ 47,90</text>

  <text x="300" y="535" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-family="Inter, system-ui, sans-serif" font-size="12" text-decoration="line-through">de R$ 997,00</text>

  <!-- Reis IA -->
  <text x="300" y="575" text-anchor="middle" fill="rgba(255,255,255,0.15)" font-family="Inter, system-ui, sans-serif" font-size="11">Reis IA · reisia.moronireis.com.br/evento</text>
</svg>
