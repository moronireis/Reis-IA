<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" fill="none">
  <rect width="1200" height="628" fill="#000000"/>

  <!-- Aurora gradient -->
  <ellipse cx="300" cy="250" rx="500" ry="300" fill="rgba(74,144,255,0.06)"/>
  <ellipse cx="900" cy="350" rx="400" ry="250" fill="rgba(74,144,255,0.04)"/>

  <!-- Left content -->
  <!-- Badge -->
  <rect x="80" y="140" width="240" height="32" rx="16" fill="rgba(74,144,255,0.1)" stroke="rgba(74,144,255,0.25)" stroke-width="1"/>
  <text x="200" y="161" text-anchor="middle" fill="#4A90FF" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">Imersão Online · 26 de Março</text>

  <!-- MDV Logo -->
  <text x="80" y="240" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" letter-spacing="-0.03em">MDV</text>
  <rect x="80" y="252" width="100" height="3" rx="1.5" fill="#4A90FF"/>
  <text x="80" y="280" fill="rgba(255,255,255,0.4)" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" letter-spacing="0.12em">IMERSÃO IA</text>

  <!-- Subtitle -->
  <text x="80" y="330" fill="rgba(255,255,255,0.6)" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">Agentes de IA que montam sua operação de vendas.</text>
  <text x="80" y="355" fill="rgba(255,255,255,0.6)" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400">Site, copy, estratégia, design e entrega. No automático.</text>

  <!-- Price -->
  <rect x="80" y="390" width="200" height="52" rx="26" fill="#4A90FF"/>
  <text x="180" y="422" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">R$ 47,90</text>
  <text x="300" y="422" fill="rgba(255,255,255,0.35)" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="400" text-decoration="line-through">de R$ 997</text>

  <!-- Right side: social proof -->
  <g transform="translate(720, 140)">
    <rect width="400" height="340" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="200" y="45" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em">RESULTADOS DA COMUNIDADE</text>

    <!-- +700K -->
    <text x="200" y="120" text-anchor="middle" fill="#4A90FF" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800">+R$ 700K</text>
    <text x="200" y="150" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter, system-ui, sans-serif" font-size="14">em contratos gerados pela comunidade</text>

    <line x1="60" y1="180" x2="340" y2="180" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="120" y="230" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">R$ 35K</text>
    <text x="120" y="252" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Inter, system-ui, sans-serif" font-size="11">maior contrato</text>

    <line x1="200" y1="205" x2="200" y2="265" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="280" y="230" text-anchor="middle" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">20</text>
    <text x="280" y="252" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Inter, system-ui, sans-serif" font-size="11">agentes no sistema</text>

    <line x1="60" y1="280" x2="340" y2="280" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="200" y="315" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="Inter, system-ui, sans-serif" font-size="13" font-style="italic">"Esse conteúdo resolveu minha vida."</text>
  </g>

  <!-- Footer -->
  <text x="80" y="550" fill="rgba(255,255,255,0.25)" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="300">Reis IA</text>
  <text x="80" y="570" fill="rgba(255,255,255,0.15)" font-family="Inter, system-ui, sans-serif" font-size="11">reisia.moronireis.com.br/evento</text>
</svg>
