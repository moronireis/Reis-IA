<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A1520"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B4FF"/>
      <stop offset="100%" stop-color="#4A90FF"/>
    </linearGradient>
  </defs>
  <circle cx="540" cy="540" r="540" fill="url(#bg)"/>
  <circle cx="540" cy="540" r="534" fill="none" stroke="#00B4FF" stroke-opacity="0.2" stroke-width="2"/>
  <!-- Play arrow -->
  <g transform="translate(540, 440)">
    <polygon points="-54,-76 76,0 -54,76" fill="none" stroke="url(#grad)" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="8" fill="#00B4FF" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="540" y="660" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="60" fill="white" letter-spacing="0.05em">STARTER</text>
  <text x="540" y="720" text-anchor="middle" font-family="Inter, sans-serif" font-weight="400" font-size="28" fill="#00B4FF" fill-opacity="0.5" letter-spacing="0.1em">COMECE AQUI</text>
</svg>