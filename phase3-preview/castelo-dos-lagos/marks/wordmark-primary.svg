<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" role="img" aria-label="Castelo dos Lagos">
  <!-- Primary wordmark — cream on forest. Text-based Cormorant Garamond. Production: convert glyphs to paths via Figma/Illustrator. -->
  <rect width="800" height="160" fill="#1E2E24"/>
  <text x="400" y="95"
        font-family="'Cormorant Garamond', 'Cormorant', Georgia, serif"
        font-size="64"
        font-weight="300"
        fill="#F4EFE6"
        text-anchor="middle"
        letter-spacing="3.2">
    Castelo<tspan font-size="22" font-style="italic" fill="#F4EFE6" fill-opacity="0.55" letter-spacing="2" dy="-4"> dos </tspan><tspan font-style="italic" font-weight="300" fill="#C9A96E" dy="4">Lagos</tspan>
  </text>
</svg>
