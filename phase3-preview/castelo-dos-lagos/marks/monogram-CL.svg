<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Castelo dos Lagos monogram CL">
  <!-- Monogram C | L — Cormorant italic, hairline gold divider -->
  <rect width="200" height="200" fill="#1E2E24"/>
  <text x="70" y="130"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="120"
        font-weight="300"
        font-style="italic"
        fill="#F4EFE6"
        text-anchor="middle">C</text>
  <line x1="100" y1="50" x2="100" y2="150" stroke="#C9A96E" stroke-width="1"/>
  <text x="132" y="130"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="120"
        font-weight="300"
        font-style="italic"
        fill="#F4EFE6"
        text-anchor="middle">L</text>
</svg>
