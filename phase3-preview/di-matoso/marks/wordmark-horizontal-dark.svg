<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" role="img" aria-label="Buffet Di Matoso">
  <!-- Horizontal dark — cream on charcoal -->
  <rect width="900" height="160" fill="#1A1A1A"/>
  <text x="450" y="55"
        font-family="'Inter', sans-serif"
        font-size="16"
        font-weight="400"
