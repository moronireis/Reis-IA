<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" role="img" aria-label="Buffet Di Matoso">
  <!-- Stacked — hero mobile / footer / menu card -->
  <rect width="600" height="480" fill="#1A1A1A"/>
  <text x="300" y="100"
        font-family="'Inter', sans-serif"
        font-size="18"
        font-weight="400"
        fill="#FAFAF7"
        fill-opacity="0.7"
        text-anchor="middle"
        letter-spacing="5.4">BUFFET</text>
  <line x1="250" y1="120" x2="350" y2="120" stroke="#B8860B" stroke-width="0.8"/>
  <text x="300" y="210"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="76"
        font-weight="400"
        fill="#FAFAF7"
        text-anchor="middle"
        letter-spacing="4">DI</text>
  <text x="300" y="360"
