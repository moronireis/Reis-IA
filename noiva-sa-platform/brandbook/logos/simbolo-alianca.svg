<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 52">
  <!-- Noiva S.A. — Simbolo Alianca Entrecruzada (Variation B — Overlap Reveal) -->
  <!-- Two interlocking circles with clipped interlock: left ring passes in front of right -->
  <defs>
    <clipPath id="clipOverlap">
      <rect x="40" y="0" width="40" height="52"/>
    </clipPath>
  </defs>
  <circle cx="26" cy="26" r="18" fill="none" stroke="#DBA99F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="54" cy="26" r="18" fill="none" stroke="#9C958F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Re-draw left circle's right arc on top to create interlock -->
  <circle cx="26" cy="26" r="18" fill="none" stroke="#DBA99F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#clipOverlap)"/>
</svg>