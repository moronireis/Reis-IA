<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 52">
  <!-- Noiva S.A. — Logo Combinado (Simbolo + Wordmark, Horizontal) -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&amp;display=swap');
  </style>
  <defs>
    <clipPath id="clipOverlap">
      <rect x="40" y="0" width="40" height="52"/>
    </clipPath>
  </defs>
  <!-- Alianca symbol with interlock -->
  <circle cx="26" cy="26" r="16" fill="none" stroke="#DBA99F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="50" cy="26" r="16" fill="none" stroke="#9C958F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="26" cy="26" r="16" fill="none" stroke="#DBA99F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#clipOverlap)"/>
  <!-- Wordmark -->
  <text x="86" y="38" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="300" font-size="40" letter-spacing="6" fill="#DBA99F">NOIVA</text>
  <text x="262" y="38" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="300" font-size="40" letter-spacing="1" fill="#9C958F">S.A.</text>
</svg>