<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Z7 Combined: Z and 7 overlaid forming the hourglass
       The 7: top bar (16,10)-(52,10) + diagonal down to (28,54)
       The Z: diagonal from (36,10) down to (12,54) + bottom bar (12,54)-(48,54)
       Diagonals cross at center (32,32) = hourglass waist -->
  <!-- 7: full opacity (leads) -->
  <path d="M16,10 L52,10 L28,54"/>
  <!-- Z: 0.7 opacity (complements) -->
  <path d="M36,10 L12,54 L48,54" opacity="0.7"/>
</svg>
