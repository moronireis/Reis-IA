<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Pure geometric hourglass: two triangles meeting at center point -->
  <!-- Top horizontal bar -->
  <line x1="16" y1="8" x2="48" y2="8"/>
  <!-- Top triangle sides converging to center -->
  <line x1="16" y1="8" x2="32" y2="32"/>
  <line x1="48" y1="8" x2="32" y2="32"/>
  <!-- Bottom triangle sides diverging from center -->
  <line x1="32" y1="32" x2="16" y2="56"/>
  <line x1="32" y1="32" x2="48" y2="56"/>
  <!-- Bottom horizontal bar -->
  <line x1="16" y1="56" x2="48" y2="56"/>
</svg>
