<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>AGENTES [IA] — Cover Vertical 1080×1350</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg:#000;
    --blue:#4A90FF;
    --blue-bright:#6AADFF;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
  html,body{width:1080px;height:1350px;background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden}

  .stage{position:relative;width:1080px;height:1350px;background:#000;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center}

  .grid{position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(74,144,255,0.06) 1px,transparent 1px),
      linear-gradient(90deg,rgba(74,144,255,0.06) 1px,transparent 1px);
    background-size:54px 54px;
    mask-image:radial-gradient(circle at center 45%, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 90%);
    -webkit-mask-image:radial-gradient(circle at center 45%, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 90%);
  }

  .glow{position:absolute;border-radius:50%;filter:blur(140px);pointer-events:none}
  .glow-1{width:760px;height:760px;background:radial-gradient(circle,rgba(74,144,255,0.32) 0%,transparent 70%);top:-180px;left:-200px}
  .glow-2{width:600px;height:600px;background:radial-gradient(circle,rgba(74,144,255,0.22) 0%,transparent 70%);bottom:-120px;right:-160px}
  .glow-3{width:380px;height:380px;background:radial-gradient(circle,rgba(74,144,255,0.18) 0%,transparent 70%);top:38%;left:50%;transform:translate(-50%,-50%)}

  .tags{position:absolute;inset:0;pointer-events:none}
  .t{position:absolute;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--blue);opacity:0.10;letter-spacing:-0.02em;user-select:none}
  .t1{top:5%;left:5%;font-size:60px}
  .t2{top:11%;right:6%;font-size:48px}
  .t3{top:24%;left:3%;font-size:42px}
  .t4{top:28%;right:4%;font-size:38px}
  .t5{bottom:34%;left:5%;font-size:54px}
  .t6{bottom:20%;right:5%;font-size:64px}
  .t7{bottom:7%;left:34%;font-size:34px;opacity:0.07}
  .t8{top:6%;left:42%;font-size:30px;opacity:0.07}

  .orbit{position:absolute;border:1px solid rgba(74,144,255,0.18);border-radius:50%;pointer-events:none}
  .orbit-1{width:1500px;height:1500px;top:-260px;left:-210px;opacity:0.5}
  .orbit-2{width:1100px;height:1100px;top:60px;left:-10px;opacity:0.35}

  .corner{position:absolute;width:42px;height:42px;border:1px solid var(--blue);opacity:0.6}
  .c-tl{top:42px;left:42px;border-right:0;border-bottom:0}
  .c-tr{top:42px;right:42px;border-left:0;border-bottom:0}
  .c-bl{bottom:158px;left:42px;border-right:0;border-top:0}
  .c-br{bottom:158px;right:42px;border-left:0;border-top:0}

  .frame{position:relative;z-index:5;text-align:center;padding:80px 96px}

  .badge{display:inline-flex;align-items:center;gap:12px;background:rgba(74,144,255,0.10);border:1px solid rgba(74,144,255,0.35);border-radius:6px;padding:14px 28px;margin-bottom:62px;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.18em;text-transform:uppercase;color:var(--blue)}
  .badge .dot{width:9px;height:9px;background:var(--blue);border-radius:50%;box-shadow:0 0 14px var(--blue)}

  .word{font-family:'Inter',sans-serif;font-weight:300;font-size:188px;line-height:0.92;letter-spacing:-0.05em;margin-bottom:34px;text-shadow:0 0 80px rgba(74,144,255,0.22)}
  .word .ia{color:var(--blue);font-weight:300}

  .tagline{font-family:'Inter',sans-serif;font-weight:500;font-size:38px;line-height:1.32;letter-spacing:-0.015em;color:rgba(255,255,255,0.80);max-width:880px;margin:0 auto 60px}
  .tagline .hi{color:var(--blue);font-weight:600}

  .stats{display:inline-flex;align-items:stretch;border:1px solid rgba(74,144,255,0.35);border-radius:12px;overflow:hidden;background:rgba(74,144,255,0.05);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  .stat{padding:26px 44px;border-right:1px solid rgba(74,144,255,0.20);text-align:center}
  .stat:last-child{border-right:0}
  .stat .num{display:block;font-family:'Inter',sans-serif;font-weight:800;font-size:48px;color:#fff;line-height:1;letter-spacing:-0.03em}
  .stat .lab{display:block;margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.55)}
  .stat .num.blue{color:var(--blue)}

  .price-strip{position:absolute;bottom:0;left:0;right:0;z-index:6;padding:42px 60px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.88) 55%, #000 100%)}
  .brand{font-family:'Inter',sans-serif;font-weight:300;font-size:24px;letter-spacing:0.04em;color:rgba(255,255,255,0.58)}
  .brand b{font-weight:300;color:var(--blue)}
  .price-pill{display:inline-flex;align-items:baseline;gap:10px;background:var(--blue);color:#000;padding:16px 30px;border-radius:10px;font-family:'Inter',sans-serif;font-weight:800;font-size:34px;letter-spacing:-0.02em;box-shadow:0 0 0 1px rgba(255,255,255,0.10), 0 16px 56px rgba(74,144,255,0.50)}
  .price-pill .small{font-size:16px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;opacity:0.80}
</style>
</head>
<body>
<div class="stage">
  <div class="grid"></div>
  <div class="orbit orbit-1"></div>
  <div class="orbit orbit-2"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>

  <div class="tags">
    <div class="t t1">@copy</div>
    <div class="t t2">@strategy</div>
    <div class="t t3">@design</div>
    <div class="t t4">@brand</div>
    <div class="t t5">@traffic</div>
    <div class="t t6">@dev</div>
    <div class="t t7">@hooks</div>
    <div class="t t8">@review</div>
  </div>

  <div class="corner c-tl"></div>
  <div class="corner c-tr"></div>
  <div class="corner c-bl"></div>
  <div class="corner c-br"></div>

  <div class="frame">
    <div class="badge"><span class="dot"></span>7 SQUADS · 40+ AGENTES</div>
    <h1 class="word">AGENTES <span class="ia">[IA]</span></h1>
    <p class="tagline">Seu time completo de marketing com IA.<br/><span class="hi">Copy, design, estratégia, branding e tráfego</span> — prontos no Claude Code.</p>

    <div class="stats">
      <div class="stat"><span class="num blue">40+</span><span class="lab">Agentes</span></div>
      <div class="stat"><span class="num">7</span><span class="lab">Squads</span></div>
      <div class="stat"><span class="num">4</span><span class="lab">Videoaulas</span></div>
      <div class="stat"><span class="num">30<span style="font-size:26px">min</span></span><span class="lab">Pra instalar</span></div>
    </div>
  </div>

  <div class="price-strip">
    <div class="brand">by <b>REIS [IA]</b></div>
    <div class="price-pill"><span class="small">R$</span>47</div>
  </div>
</div>
</body>
</html>
