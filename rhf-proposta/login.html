<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | RHF Talentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(90vw 90vw at 8% -20%, rgba(242,101,34,0.13) 0%, transparent 60%), radial-gradient(70vw 70vw at 110% 120%, rgba(37,99,235,0.12) 0%, transparent 60%), #06070c;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-wrap {
    width: 100%;
    max-width: 400px;
  }

  /* Brand mark */
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    margin-bottom: 36px;
  }
  .brand-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #F26522;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .brand-text {
    display: flex;
    flex-direction: column;
  }
  .brand-name {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .brand-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    font-weight: 400;
    margin-top: 2px;
  }

  /* Card */
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35), 0 4px 16px rgba(0,0,0,0.2);
  }

  .card-title {
    font-size: 20px;
    font-weight: 700;
    color: #111827;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .card-sub {
    font-size: 14px;
    color: #6B7280;
    margin-bottom: 28px;
  }

  /* Form */
  .field {
    margin-bottom: 18px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #E5E7EB;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    color: #111827;
    background: #F9FAFB;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  input:focus {
    border-color: #F26522;
    background: #fff;
  }
  input::placeholder {
    color: #9CA3AF;
  }

  /* Error */
  .error-msg {
    display: none;
    background: #FEF2F2;
    border: 1px solid #FECACA;
    color: #DC2626;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 18px;
    align-items: center;
    gap: 8px;
  }
  .error-msg.visible {
    display: flex;
  }
  .error-msg svg {
    flex-shrink: 0;
  }

  /* Button */
  .btn-login {
    width: 100%;
    padding: 13px;
    background: #F26522;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 4px;
  }
  .btn-login:hover:not(:disabled) {
    background: #D4571B;
  }
  .btn-login:active:not(:disabled) {
    transform: scale(0.99);
  }
  .btn-login:disabled {
    opacity: 0.65;
    cursor: not-allowed;
  }

  /* Spinner */
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn-login.loading .spinner { display: block; }
  .btn-login.loading .btn-label { display: none; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Footer */
  .card-footer {
    margin-top: 24px;
    text-align: center;
    font-size: 12px;
    color: #9CA3AF;
  }
</style>
</head>
<body>

<div class="login-wrap">

  <div class="brand">
    <img src="/assets/logo-rhf-mark.png" alt="RHF Talentos" style="height:48px; width:auto; filter: brightness(0) invert(1);">
  </div>

  <div class="card">
    <div class="card-title">Bem-vindo de volta</div>
    <div class="card-sub">Faça login para acessar a plataforma.</div>

    <div class="error-msg" id="errorMsg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorText">Email ou senha incorretos.</span>
    </div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="seu@email.com.br"
          autocomplete="email"
          required
        >
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <div style="position:relative;">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
            style="padding-right:44px;"
          >
          <button type="button" id="togglePwd" title="Mostrar senha" onclick="togglePassword()" style="position:absolute;right:0;top:0;bottom:0;width:42px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#9CA3AF;transition:color 0.15s;" onmouseover="this.style.color='#F26522'" onmouseout="this.style.color='#9CA3AF'">
            <svg id="iconEye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="iconEyeOff" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="field" style="margin-bottom:4px;">
        <label style="display:flex;align-items:center;gap:9px;cursor:pointer;font-weight:500;color:#374151;user-select:none;">
          <input type="checkbox" id="rememberMe" style="width:16px;height:16px;accent-color:#F26522;cursor:pointer;flex-shrink:0;">
          Salvar conta neste computador
        </label>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <div class="spinner"></div>
        <span class="btn-label">Entrar</span>
      </button>
    </form>

    <div class="card-footer">
      Acesso restrito &mdash; u4digital &times; RHF Talentos
    </div>
  </div>

</div>

<script>
  (function () {
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const rememberChk = document.getElementById('rememberMe');

    // ── Carregar conta salva ────────────────────────────────────────────────
    const saved = localStorage.getItem('rhf_saved_account');
    if (saved) {
      try {
        const { email, password } = JSON.parse(saved);
        if (email) emailInput.value = email;
        if (password) passwordInput.value = password;
        rememberChk.checked = true;
      } catch (_) {}
    }

    // ── Toggle show/hide senha ──────────────────────────────────────────────
    window.togglePassword = function () {
      const isText = passwordInput.type === 'text';
      passwordInput.type = isText ? 'password' : 'text';
      document.getElementById('iconEye').style.display = isText ? '' : 'none';
      document.getElementById('iconEyeOff').style.display = isText ? 'none' : '';
    };

    // ── Se já autenticado, redireciona direto ───────────────────────────────
    const existingToken = localStorage.getItem('rhf_token');
    if (existingToken) {
      fetch('/api/auth?action=verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: existingToken }),
      })
        .then(r => r.ok ? window.location.replace('/mvp') : null)
        .catch(() => null);
    }

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function hideError() {
      errorMsg.classList.remove('visible');
    }

    function setLoading(on) {
      btn.disabled = on;
      btn.classList.toggle('loading', on);
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      hideError();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Preencha email e senha.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/api/auth?action=login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Email ou senha incorretos.');
          return;
        }

        // Salvar ou limpar conta
        if (rememberChk.checked) {
          localStorage.setItem('rhf_saved_account', JSON.stringify({ email, password }));
        } else {
          localStorage.removeItem('rhf_saved_account');
        }

        // Persistir token e redirecionar
        localStorage.setItem('rhf_token', data.access_token);
        if (data.refresh_token) localStorage.setItem('rhf_refresh', data.refresh_token);
        if (data.profile) localStorage.setItem('rhf_user', JSON.stringify({ ...data.user, ...data.profile }));
        window.location.replace('/mvp');

      } catch (err) {
        showError('Erro de conexão. Verifique sua internet.');
      } finally {
        setLoading(false);
      }
    });
  })();
</script>

</body>
</html>
