<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" fill="none">
  <!-- Framed botanical monogram v3 — HERO mark
       Inspired by Emily & John (ref-03). Oval/arch botanical frame around M & D.
       All lines hairline (0.75px), copperplate engraving feel. currentColor for theming. -->
  <style>
    .hm-serif { font-family: 'Cormorant Garamond', 'EB Garamond', Garamond, 'Times New Roman', serif; font-weight: 300; fill: currentColor; }
    .hm-md    { font-size: 150px; letter-spacing: 6px; }
    .hm-amp   { font-size: 140px; font-style: italic; }
    .hm-eyebrow { font-family: 'Cormorant Garamond', 'EB Garamond', serif; font-weight: 300; font-size: 18px; letter-spacing: 8px; fill: currentColor; text-transform: uppercase; font-style: italic; }
    .hm-meta    { font-family: 'Inter', 'Helvetica Neue', sans-serif; font-weight: 300; font-size: 12px; letter-spacing: 3.5px; fill: currentColor; text-transform: uppercase; }
    .hm-line  { stroke: currentColor; fill: none; stroke-width: 0.75; stroke-linecap: round; stroke-linejoin: round; }
    .hm-line-soft { stroke: currentColor; fill: none; stroke-width: 0.6; stroke-linecap: round; stroke-linejoin: round; opacity: 0.85; }
  </style>

  <!-- ============ BOTANICAL FRAME — ARCH/OVAL ============ -->
  <g class="hm-line">
    <!-- Top arch: two curving branches meeting at top center -->
    <path d="M160 220 C 150 160, 180 110, 240 96 C 290 86, 320 96, 340 110"/>
    <path d="M440 220 C 450 160, 420 110, 360 96 C 310 86, 280 96, 260 110"/>
    <!-- Side vertical bounds (very soft, barely there) -->
    <path d="M140 240 C 132 300, 130 380, 142 460" opacity="0.7"/>
    <path d="M460 240 C 468 300, 470 380, 458 460" opacity="0.7"/>
    <!-- Bottom arch closing the oval -->
    <path d="M150 470 C 170 540, 240 572, 300 574 C 360 572, 430 540, 450 470"/>

    <!-- ============ TOP LEFT BRANCH — roses + leaves ============ -->
    <!-- main stem curve -->
    <path d="M200 230 C 180 190, 180 150, 210 120" class="hm-line-soft"/>
    <!-- big rose -->
    <g transform="translate(204 118)">
      <circle cx="0" cy="0" r="3"/>
      <path d="M-4 -2 C -10 -8, -10 -18, -2 -20 S 12 -16, 10 -6 S 2 6, -4 -2 Z"/>
      <path d="M4 -2 C 12 -4, 18 -12, 14 -20 S 0 -24, -4 -16"/>
      <path d="M-6 2 C -16 0, -22 -10, -18 -20 S -4 -28, 4 -22"/>
      <path d="M6 4 C 18 6, 24 -4, 22 -14 S 10 -26, 0 -22"/>
      <path d="M-8 6 C -20 10, -28 0, -24 -12 S -10 -28, 2 -26"/>
    </g>
    <!-- tulip accent below rose -->
    <g transform="translate(170 170)">
      <path d="M0 40 C -2 20, 2 10, 0 -4"/>
      <path d="M0 -4 C -10 -6, -14 4, -12 16 C -10 22, -4 26, 0 26"/>
      <path d="M0 -4 C 10 -6, 14 4, 12 16 C 10 22, 4 26, 0 26"/>
    </g>
    <!-- leaves spray -->
    <path d="M194 230 C 170 220, 150 230, 142 252 C 154 260, 174 256, 190 244" class="hm-line-soft"/>
    <path d="M142 252 C 144 240, 148 232, 154 226" class="hm-line-soft"/>
    <path d="M208 240 C 190 260, 176 286, 178 312" class="hm-line-soft"/>

    <!-- ============ TOP RIGHT BRANCH — mirror: rose + tulip ============ -->
    <path d="M400 230 C 420 190, 420 150, 390 120" class="hm-line-soft"/>
    <g transform="translate(396 118)">
      <circle cx="0" cy="0" r="3"/>
      <path d="M4 -2 C 10 -8, 10 -18, 2 -20 S -12 -16, -10 -6 S -2 6, 4 -2 Z"/>
      <path d="M-4 -2 C -12 -4, -18 -12, -14 -20 S 0 -24, 4 -16"/>
      <path d="M6 2 C 16 0, 22 -10, 18 -20 S 4 -28, -4 -22"/>
      <path d="M-6 4 C -18 6, -24 -4, -22 -14 S -10 -26, 0 -22"/>
      <path d="M8 6 C 20 10, 28 0, 24 -12 S 10 -28, -2 -26"/>
    </g>
    <g transform="translate(430 170)">
      <path d="M0 40 C 2 20, -2 10, 0 -4"/>
      <path d="M0 -4 C -10 -6, -14 4, -12 16 C -10 22, -4 26, 0 26"/>
      <path d="M0 -4 C 10 -6, 14 4, 12 16 C 10 22, 4 26, 0 26"/>
    </g>
    <path d="M406 230 C 430 220, 450 230, 458 252 C 446 260, 426 256, 410 244" class="hm-line-soft"/>
    <path d="M458 252 C 456 240, 452 232, 446 226" class="hm-line-soft"/>
    <path d="M392 240 C 410 260, 424 286, 422 312" class="hm-line-soft"/>

    <!-- ============ MIDDLE SIDE LEAVES ============ -->
    <g class="hm-line-soft">
      <path d="M142 330 C 120 340, 112 360, 120 380 C 136 384, 150 372, 152 356"/>
      <path d="M120 380 C 122 368, 126 358, 132 352"/>
      <path d="M146 400 C 124 410, 116 430, 126 450 C 140 452, 154 440, 154 424"/>
    </g>
    <g class="hm-line-soft">
      <path d="M458 330 C 480 340, 488 360, 480 380 C 464 384, 450 372, 448 356"/>
      <path d="M480 380 C 478 368, 474 358, 468 352"/>
      <path d="M454 400 C 476 410, 484 430, 474 450 C 460 452, 446 440, 446 424"/>
    </g>

    <!-- ============ BOTTOM LEFT BRANCH ============ -->
    <g transform="translate(180 500)">
      <path d="M0 0 C 20 -6, 40 4, 52 22" class="hm-line-soft"/>
      <path d="M10 -4 C 4 -16, 10 -28, 24 -28 C 28 -18, 22 -8, 14 -2"/>
      <path d="M30 4 C 24 -8, 32 -20, 46 -16 C 48 -6, 40 2, 34 6"/>
      <!-- rosebud -->
      <g transform="translate(56 26)">
        <path d="M-5 0 C -8 -8, -2 -14, 5 -10 S 8 2, 0 4 C -4 4, -6 2, -5 0 Z"/>
        <path d="M-1 -4 C 1 -7, 4 -7, 5 -4" opacity="0.7"/>
      </g>
    </g>
    <!-- ============ BOTTOM RIGHT BRANCH (mirror) ============ -->
    <g transform="translate(420 500)">
      <path d="M0 0 C -20 -6, -40 4, -52 22" class="hm-line-soft"/>
      <path d="M-10 -4 C -4 -16, -10 -28, -24 -28 C -28 -18, -22 -8, -14 -2"/>
      <path d="M-30 4 C -24 -8, -32 -20, -46 -16 C -48 -6, -40 2, -34 6"/>
      <g transform="translate(-56 26)">
        <path d="M5 0 C 8 -8, 2 -14, -5 -10 S -8 2, 0 4 C 4 4, 6 2, 5 0 Z"/>
      </g>
    </g>

    <!-- ============ BOTTOM CENTER ORNAMENT ============ -->
    <g transform="translate(300 560)">
      <!-- rosebud flanked by small leaves -->
      <path d="M-6 0 C -10 -8, -4 -16, 4 -14 S 10 -2, 4 4 C -2 6, -6 4, -6 0 Z"/>
      <path d="M-2 -4 C 0 -8, 4 -10, 6 -6" opacity="0.7"/>
      <path d="M-18 4 C -26 10, -30 18, -24 24 C -16 22, -12 14, -14 8"/>
      <path d="M18 4 C 26 10, 30 18, 24 24 C 16 22, 12 14, 14 8"/>
    </g>
  </g>

  <!-- ============ EYEBROW (save the date) ============ -->
  <text class="hm-eyebrow" x="300" y="186" text-anchor="middle" opacity="0.75">save the date</text>
  <!-- hairline flanking rules under eyebrow -->
  <line class="hm-line-soft" x1="208" y1="196" x2="262" y2="196"/>
  <line class="hm-line-soft" x1="338" y1="196" x2="392" y2="196"/>

  <!-- ============ M & D CENTER ============ -->
  <g text-anchor="middle">
    <text class="hm-serif hm-md" x="228" y="400">M</text>
    <text class="hm-serif hm-amp" x="300" y="390" font-style="italic">&amp;</text>
    <text class="hm-serif hm-md" x="372" y="400">D</text>
  </g>

  <!-- ============ META UNDER NAMES ============ -->
  <line class="hm-line-soft" x1="230" y1="438" x2="370" y2="438"/>
  <text class="hm-meta" x="300" y="458" text-anchor="middle" opacity="0.8">doze · junho · mmxxvi</text>
</svg>
