<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- M&D secondary v3 — favicon/seal only. Absolute minimal.
       Cormorant Garamond 300, italic ampersand. Hairline.
       For use at 16-64px. -->
  <style>
    .sg-serif { font-family: 'Cormorant Garamond', 'EB Garamond', Garamond, 'Times New Roman', serif; font-weight: 300; fill: currentColor; }
    .sg-letter { font-size: 58px; letter-spacing: 1px; }
    .sg-amp    { font-size: 52px; font-style: italic; }
  </style>
  <g text-anchor="middle">
    <text class="sg-serif sg-letter" x="60" y="75">M<tspan class="sg-amp" dx="2" dy="-2">&amp;</tspan><tspan dx="2" dy="2">D</tspan></text>
  </g>
</svg>
