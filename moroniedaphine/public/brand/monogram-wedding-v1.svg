      <!-- j -->
      <path d="M238 26 L 246 26 L 246 58 C 246 66, 240 72, 232 72 C 228 72, 224 70, 222 66 L 228 62 C 230 64, 232 66, 236 66 C 240 66, 240 62, 240 58 L 240 26 Z M 238 8 L 248 8 L 248 18 L 238 18 Z"/>
      <!-- u -->
      <path d="M260 26 L 268 26 L 268 52 C 268 60, 274 64, 282 64 C 290 64, 296 60, 296 52 L 296 26 L 304 26 L 304 54 C 304 64, 294 70, 282 70 C 270 70, 260 64, 260 54 Z"/>
      <!-- n -->
      <path d="M320 26 L 328 26 L 328 36 C 332 30, 340 24, 350 26 C 358 28, 362 36, 362 44 L 362 70 L 354 70 L 354 46 C 354 38, 350 32, 342 32 C 334 32, 328 38, 328 46 L 328 70 L 320 70 Z"/>
      <!-- h -->
      <path d="M380 0 L 388 0 L 388 36 C 392 30, 400 24, 410 26 C 418 28, 422 36, 422 44 L 422 70 L 414 70 L 414 46 C 414 38, 410 32, 402 32 C 394 32, 388 38, 388 46 L 388 70 L 380 70 Z"/>
      <!-- o -->
      <path d="M448 24 C 462 24, 472 36, 472 48 C 472 60, 462 70, 448 70 C 434 70, 424 60, 424 48 C 424 36, 434 24, 448 24 Z M 448 30 C 438 30, 430 38, 430 48 C 430 58, 438 64, 448 64 C 458 64, 466 58, 466 48 C 466 38, 458 30, 448 30 Z" fill-rule="evenodd"/>

      <!-- · (middle dot) -->
      <circle cx="496" cy="56" r="3.5"/>

      <!-- m -->
      <path d="M520 26 L 528 26 L 528 36 C 532 28, 538 24, 548 26 C 554 28, 558 32, 560 38 C 564 30, 572 24, 582 26 C 590 28, 594 36, 594 46 L 594 70 L 586 70 L 586 48 C 586 38, 582 32, 574 32 C 566 32, 562 38, 562 48 L 562 70 L 554 70 L 554 48 C 554 38, 550 32, 542 32 C 534 32, 528 38, 528 48 L 528 70 L 520 70 Z"/>
      <!-- m -->
      <path d="M616 26 L 624 26 L 624 36 C 628 28, 634 24, 644 26 C 650 28, 654 32, 656 38 C 660 30, 668 24, 678 26 C 686 28, 690 36, 690 46 L 690 70 L 682 70 L 682 48 C 682 38, 678 32, 670 32 C 662 32, 658 38, 658 48 L 658 70 L 650 70 L 650 48 C 650 38, 646 32, 638 32 C 630 32, 624 38, 624 48 L 624 70 L 616 70 Z"/>
      <!-- x -->
      <path d="M710 26 L 724 48 L 710 70 L 720 70 L 730 52 L 740 70 L 750 70 L 736 48 L 750 26 L 740 26 L 730 44 L 720 26 Z"/>
      <!-- x -->
      <path d="M764 26 L 778 48 L 764 70 L 774 70 L 784 52 L 794 70 L 804 70 L 790 48 L 804 26 L 794 26 L 784 44 L 774 26 Z"/>
      <!-- v -->
      <path d="M822 26 L 838 62 L 854 26 L 862 26 L 842 70 L 834 70 L 814 26 Z"/>
      <!-- i -->
      <path d="M878 26 L 886 26 L 886 70 L 878 70 Z M 878 8 L 888 8 L 888 18 L 878 18 Z"/>
