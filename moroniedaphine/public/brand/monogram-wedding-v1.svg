<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 600" fill="none">
  <!-- Wedding Monogram v1 — M & D
       Copperplate engraving aesthetic. Asymmetric botanical frame.
       All letterforms as paths (no font dependency).
       Uses currentColor for full theming flexibility. -->

  <!-- ============ BOTANICAL FRAME — ASYMMETRIC ============ -->
  <g stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Main frame — organic arch, NOT a perfect oval -->
    <!-- Top arch — slightly asymmetric, taller on left -->
    <path d="M128 210 C 118 158, 140 108, 186 82 C 218 66, 252 62, 278 64 C 310 66, 342 76, 362 96 C 384 118, 390 158, 378 210"
          stroke-width="0.7"/>
    <!-- Left side — gentle organic curve with slight inward scallop -->
    <path d="M128 210 C 120 250, 114 298, 118 340 C 122 382, 130 416, 148 452"
          stroke-width="0.65"/>
    <!-- Right side — different curve than left (asymmetric) -->
    <path d="M378 210 C 384 254, 386 302, 382 346 C 376 388, 364 424, 342 456"
          stroke-width="0.65"/>
    <!-- Bottom arch — organic, weighted slightly right -->
    <path d="M148 452 C 172 490, 214 510, 248 512 C 282 512, 316 496, 342 456"
          stroke-width="0.7"/>

    <!-- ============ TOP LEFT BOTANICAL — Rose cluster ============ -->
    <!-- Main rose — top left -->
    <g stroke-width="0.6">
      <!-- Stem arching from frame -->
      <path d="M164 130 C 148 118, 132 100, 128 80"/>
      <!-- Rose bloom — layered petals -->
      <path d="M128 80 C 118 76, 108 68, 112 56 C 116 46, 128 42, 136 48"/>
      <path d="M136 48 C 142 40, 138 28, 126 26 C 116 26, 108 34, 112 44"/>
      <path d="M112 44 C 104 38, 100 26, 108 18 C 118 12, 130 18, 132 30"/>
      <path d="M132 30 C 140 22, 148 26, 146 38 C 144 46, 136 52, 128 50"/>
      <path d="M126 50 C 120 56, 124 64, 132 64 C 138 62, 136 54, 130 52"/>
      <!-- Rose center spiral -->
      <path d="M124 46 C 126 42, 130 42, 132 46 C 132 50, 128 52, 126 48"/>
    </g>

    <!-- Leaf spray from top-left rose -->
    <g stroke-width="0.5">
      <!-- Leaf 1 — elongated, curving left -->
      <path d="M116 72 C 98 66, 84 74, 82 88"/>
      <path d="M82 88 C 92 86, 104 78, 116 72"/>
      <path d="M82 88 C 88 82, 96 76, 106 74" opacity="0.7"/>
      <!-- Leaf 2 — smaller, angled up -->
      <path d="M120 62 C 106 50, 96 52, 92 62"/>
      <path d="M92 62 C 100 58, 112 56, 120 62"/>
      <!-- Leaf 3 — trailing down -->
      <path d="M132 88 C 120 96, 108 108, 106 120"/>
      <path d="M106 120 C 114 112, 126 100, 132 88"/>
      <path d="M106 120 C 112 110, 122 100, 128 94" opacity="0.7"/>
    </g>

    <!-- Small rosebud — upper left accent -->
    <g stroke-width="0.5">
      <path d="M100 94 C 92 88, 82 86, 76 92"/>
      <path d="M76 92 C 74 100, 80 106, 88 104"/>
      <path d="M88 104 C 84 98, 82 92, 86 88"/>
      <!-- Bud sepals -->
      <path d="M76 92 C 72 96, 68 94, 70 88"/>
      <path d="M76 92 C 72 86, 76 82, 80 86"/>
    </g>

    <!-- ============ TOP RIGHT BOTANICAL — Smaller, different composition ============ -->
    <!-- Peony-style bloom — looser than left rose -->
    <g stroke-width="0.6">
      <path d="M340 118 C 356 104, 372 94, 378 76"/>
      <!-- Outer petals -->
      <path d="M378 76 C 386 68, 394 62, 392 50 C 388 40, 376 38, 370 46"/>
      <path d="M370 46 C 364 38, 358 34, 366 24 C 376 18, 386 24, 384 36"/>
      <path d="M384 36 C 392 30, 398 36, 396 46 C 394 54, 386 60, 378 56"/>
      <!-- Inner petals -->
      <path d="M378 56 C 374 50, 376 42, 382 40"/>
      <path d="M380 52 C 376 48, 378 44, 382 46"/>
    </g>

    <!-- Leaves — right side, draping down -->
    <g stroke-width="0.5">
      <path d="M384 70 C 398 76, 408 88, 404 104"/>
      <path d="M404 104 C 396 96, 390 82, 384 70"/>
      <path d="M404 104 C 398 92, 392 82, 388 76" opacity="0.7"/>
      <!-- Second leaf -->
      <path d="M372 84 C 382 92, 388 106, 384 118"/>
      <path d="M384 118 C 380 106, 376 94, 372 84"/>
    </g>

    <!-- Small bud cluster — right -->
    <g stroke-width="0.45">
      <path d="M398 52 C 404 44, 412 44, 412 52 C 410 58, 404 58, 400 54"/>
      <path d="M408 38 C 412 32, 418 34, 416 40"/>
    </g>

    <!-- ============ LEFT SIDE BOTANICAL — trailing vine ============ -->
    <g stroke-width="0.5">
      <!-- Vine stem -->
      <path d="M124 280 C 108 290, 96 306, 94 324"/>
      <!-- Leaf pair -->
      <path d="M108 292 C 96 286, 84 290, 84 302 C 92 304, 104 298, 108 292"/>
      <path d="M84 302 C 90 296, 98 292, 104 290" opacity="0.6"/>
      <path d="M100 310 C 86 316, 78 328, 84 340 C 94 338, 102 326, 100 310"/>
      <path d="M84 340 C 90 332, 96 322, 100 316" opacity="0.6"/>
      <!-- Small berry cluster -->
      <circle cx="92" cy="348" r="2.5" stroke-width="0.45"/>
      <circle cx="86" cy="354" r="2" stroke-width="0.4"/>
      <circle cx="98" cy="356" r="1.8" stroke-width="0.4"/>
    </g>

    <!-- ============ RIGHT SIDE BOTANICAL — different from left ============ -->
    <g stroke-width="0.5">
      <!-- Trailing leaves -->
      <path d="M380 290 C 396 298, 406 316, 402 336"/>
      <path d="M394 304 C 408 310, 416 324, 410 340 C 400 336, 394 322, 394 304"/>
      <path d="M410 340 C 404 330, 398 318, 396 308" opacity="0.6"/>
      <!-- Smaller leaf -->
      <path d="M388 330 C 400 338, 404 352, 396 362 C 390 356, 386 344, 388 330"/>
    </g>

    <!-- ============ BOTTOM BOTANICAL — Rose + trailing stems ============ -->
    <!-- Bottom center rose -->
    <g stroke-width="0.6">
      <path d="M240 510 C 236 520, 228 530, 220 536"/>
      <!-- Rose petals -->
      <path d="M220 536 C 212 540, 204 536, 206 526 C 210 518, 218 516, 224 522"/>
      <path d="M224 522 C 220 514, 212 510, 218 502 C 226 498, 232 506, 230 516"/>
      <path d="M230 516 C 238 512, 242 518, 238 526 C 234 532, 226 534, 222 528"/>
      <path d="M222 528 C 218 524, 220 518, 226 518 C 230 520, 228 526, 224 526"/>
    </g>

    <!-- Bottom left trailing -->
    <g stroke-width="0.5">
      <path d="M204 530 C 188 540, 170 542, 160 534"/>
      <path d="M178 538 C 168 532, 162 522, 168 514 C 176 518, 180 530, 178 538"/>
      <path d="M168 514 C 172 522, 176 530, 178 536" opacity="0.6"/>
      <!-- Small leaf -->
      <path d="M158 530 C 148 524, 142 514, 148 506 C 156 510, 158 522, 158 530"/>
    </g>

    <!-- Bottom right trailing — asymmetric, longer -->
    <g stroke-width="0.5">
      <path d="M256 512 C 274 524, 298 536, 322 538 C 338 538, 350 530, 348 518"/>
      <!-- Leaves along bottom-right trail -->
      <path d="M286 532 C 296 540, 308 542, 312 534 C 306 530, 294 530, 286 532"/>
      <path d="M320 536 C 330 542, 342 540, 342 530 C 336 528, 326 530, 320 536"/>
      <!-- Rosebud at end -->
      <path d="M348 518 C 354 512, 362 514, 360 522 C 356 528, 348 526, 348 518"/>
      <path d="M356 510 C 360 506, 364 508, 362 514"/>
    </g>

    <!-- ============ SCATTERED DETAIL — tiny leaves and dots ============ -->
    <g stroke-width="0.4" opacity="0.65">
      <!-- Upper scattered -->
      <path d="M198 74 C 204 68, 212 70, 210 78"/>
      <path d="M280 58 C 286 52, 294 54, 290 62"/>
      <circle cx="156" cy="102" r="1.2"/>
      <circle cx="332" cy="100" r="1.2"/>
      <!-- Side scattered -->
      <circle cx="110" cy="260" r="1"/>
      <circle cx="396" cy="268" r="1"/>
      <!-- Bottom scattered -->
      <circle cx="192" cy="496" r="1.2"/>
      <circle cx="310" cy="500" r="1"/>
    </g>
  </g>

  <!-- ============ EYEBROW — "save the date" as paths ============ -->
  <!-- Hand-lettered italic lowercase, copperplate style -->
  <g fill="currentColor" opacity="0.6">
    <!-- "save the date" — drawn as refined path letterforms -->
    <!-- Positioned above the initials, centered -->
    <g transform="translate(168 178) scale(0.42)">
      <!-- s -->
      <path d="M0 24 C 2 18, 8 14, 14 14 C 20 14, 24 18, 24 22 C 24 26, 20 28, 14 30 C 8 32, 4 34, 4 38 C 4 42, 8 46, 16 46 C 22 46, 26 42, 28 38" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <!-- a -->
      <path d="M40 28 C 40 22, 46 14, 54 14 C 62 14, 66 22, 66 30 L 66 46" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <path d="M66 32 C 62 28, 56 26, 50 28 C 44 30, 40 36, 42 42 C 44 46, 50 48, 56 46 C 62 44, 66 38, 66 34" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <!-- v -->
      <path d="M78 14 L 90 46 L 102 14" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <!-- e -->
      <path d="M114 30 C 114 24, 120 14, 130 14 C 140 14, 144 22, 144 30 L 114 30 C 114 38, 120 46, 130 46 C 138 46, 142 40, 144 36" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <!-- (space) -->
      <!-- t -->
      <path d="M170 6 L 170 46" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <path d="M160 16 L 180 16" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <!-- h -->
      <path d="M194 2 L 194 46" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <path d="M194 24 C 200 16, 208 14, 214 16 C 220 20, 222 28, 222 46" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <!-- e -->
      <path d="M236 30 C 236 24, 242 14, 252 14 C 262 14, 266 22, 266 30 L 236 30 C 236 38, 242 46, 252 46 C 260 46, 264 40, 266 36" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <!-- (space) -->
      <!-- d -->
      <path d="M304 2 L 304 46" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <path d="M304 30 C 300 22, 294 14, 284 16 C 276 18, 272 28, 274 36 C 276 44, 284 48, 292 46 C 298 44, 302 38, 304 32" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <!-- a -->
      <path d="M320 28 C 320 22, 326 14, 334 14 C 342 14, 346 22, 346 30 L 346 46" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <path d="M346 32 C 342 28, 336 26, 330 28 C 324 30, 320 36, 322 42 C 324 46, 330 48, 336 46 C 342 44, 346 38, 346 34" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <!-- t -->
      <path d="M362 6 L 362 46" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <path d="M352 16 L 372 16" stroke="currentColor" stroke-width="1.8" fill="none"/>
      <!-- e -->
      <path d="M386 30 C 386 24, 392 14, 402 14 C 412 14, 416 22, 416 30 L 386 30 C 386 38, 392 46, 402 46 C 410 46, 414 40, 416 36" stroke="currentColor" stroke-width="1.8" fill="none"/>
    </g>
  </g>

  <!-- Hairline rules flanking eyebrow -->
  <line x1="168" y1="200" x2="216" y2="200" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="270" y1="200" x2="318" y2="200" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" opacity="0.4"/>

  <!-- ============ MONOGRAM — M & D as hand-lettered paths ============ -->
  <!-- Fraunces-inspired: high contrast, soft serifs, warm optical feel -->
  <g stroke="currentColor" fill="currentColor" stroke-width="0.3">

    <!-- === LETTER M === -->
    <!-- Fraunces-style: high contrast strokes, ball terminals, soft bracketed serifs -->
    <g transform="translate(126 224)">
      <path d="
        M 0 140 L 0 12 C 0 6, 2 2, 6 0 L 14 0 C 16 0, 18 2, 19 6
        L 52 100 C 54 106, 56 110, 58 114
        C 60 110, 62 106, 64 100
        L 97 6 C 98 2, 100 0, 102 0 L 110 0 C 114 2, 116 6, 116 12
        L 116 140
        L 108 140 C 106 140, 104 138, 104 134 L 104 28
        L 68 130 C 66 136, 64 138, 60 138
        L 56 138 C 52 138, 50 136, 48 130
        L 12 28 L 12 134 C 12 138, 10 140, 8 140 Z
        "
        fill="currentColor" stroke="none"/>
    </g>

    <!-- === AMPERSAND & === -->
    <!-- Ornamental italic, 40% height of M, calligraphic feel -->
    <g transform="translate(216 296)">
      <path d="
        M 48 56 C 42 62, 34 66, 26 66
        C 14 66, 4 58, 4 46 C 4 38, 10 30, 22 24
        L 14 14 C 10 8, 10 4, 14 0 C 18 -2, 24 -2, 30 0
        C 34 2, 36 6, 36 10 L 36 16
        C 36 20, 34 24, 30 28
        L 26 32 C 20 36, 16 40, 16 46
        C 16 52, 20 56, 28 56
        C 34 56, 40 52, 44 46
        Z
        "
        fill="currentColor" stroke="none" opacity="0.85"
        transform="skewX(-8)"/>
    </g>

    <!-- === LETTER D === -->
    <!-- Fraunces-style: elegant bowl, consistent with M -->
    <g transform="translate(268 224)">
      <path d="
        M 0 0 L 36 0
        C 68 0, 90 24, 90 70
        C 90 116, 68 140, 36 140
        L 0 140 Z
        M 12 12 L 12 128 L 34 128
        C 60 128, 78 108, 78 70
        C 78 32, 60 12, 34 12 Z
        "
        fill="currentColor" stroke="none"
        fill-rule="evenodd"/>
    </g>
  </g>

  <!-- ============ DECORATIVE HAIRLINE UNDER INITIALS ============ -->
  <g stroke="currentColor" stroke-linecap="round">
    <line x1="170" y1="382" x2="236" y2="382" stroke-width="0.5" opacity="0.45"/>
    <!-- small diamond ornament -->
    <path d="M240 382 L 243 379 L 246 382 L 243 385 Z" fill="currentColor" opacity="0.4" stroke="none"/>
    <line x1="250" y1="382" x2="316" y2="382" stroke-width="0.5" opacity="0.45"/>
  </g>

  <!-- ============ DATE LINE — "doze · junho · mmxxvi" as paths ============ -->
  <!-- Small caps tracking-wide, Inter-inspired geometric sans -->
  <g fill="currentColor" opacity="0.6">
    <g transform="translate(140 400) scale(0.32)">
      <!-- d -->
      <path d="M10 0 L 10 36 C 16 28, 24 24, 32 26 C 40 28, 46 36, 46 46 C 46 56, 40 64, 32 66 C 24 66, 16 62, 10 56 L 10 70 L 2 70 L 2 0 Z M 10 38 L 10 54 C 14 60, 22 62, 30 60 C 36 56, 40 50, 40 46 C 40 40, 36 34, 30 32 C 22 30, 14 34, 10 38 Z" fill-rule="evenodd"/>
      <!-- o -->
      <path d="M68 24 C 82 24, 92 36, 92 48 C 92 60, 82 70, 68 70 C 54 70, 44 60, 44 48 C 44 36, 54 24, 68 24 Z M 68 30 C 58 30, 50 38, 50 48 C 50 58, 58 64, 68 64 C 78 64, 86 58, 86 48 C 86 38, 78 30, 68 30 Z" fill-rule="evenodd"/>
      <!-- z -->
