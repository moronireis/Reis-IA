<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none">
  <!-- Wordmark primary v3 — two lines stacked, ampersand centered as decorative pivot
       Typography: Cormorant Garamond 300, tracking +0.10em
       "&" italic 200/300 at 1.8x scale between the two lines -->
  <style>
    .wm-serif { font-family: 'Cormorant Garamond', 'Cormorant', 'EB Garamond', Garamond, 'Times New Roman', serif; fill: currentColor; }
    .wm-name  { font-weight: 300; font-size: 82px; letter-spacing: 8.2px; }
    .wm-amp   { font-weight: 300; font-size: 150px; font-style: italic; letter-spacing: 0; }
    .wm-rule  { stroke: currentColor; stroke-width: 0.75; opacity: 0.5; }
  </style>
  <g text-anchor="middle">
    <text class="wm-serif wm-name" x="600" y="110">MORONI REIS</text>
    <!-- hairline decorative rules flanking the ampersand -->
    <line class="wm-rule" x1="200" y1="220" x2="540" y2="220"/>
    <line class="wm-rule" x1="660" y1="220" x2="1000" y2="220"/>
    <text class="wm-serif wm-amp" x="600" y="265">&amp;</text>
    <text class="wm-serif wm-name" x="600" y="370">DAPHINE OLIVEIRA</text>
  </g>
</svg>
