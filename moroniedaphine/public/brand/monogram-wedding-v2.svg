<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 600" fill="none">
  <!-- Wedding Monogram v2 — M & D
       Variant: Looser, more organic asymmetric frame.
       Garden roses top-heavy, trailing wisteria-like bottom.
       All letterforms as paths (no font dependency).
       Uses currentColor for full theming flexibility. -->

  <!-- ============ BOTANICAL FRAME — VARIANT: TOP-HEAVY GARDEN ============ -->
  <g stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Main frame — more open, organic shape -->
    <!-- Top arch — weighted left, garden rose cascade -->
    <path d="M132 228 C 116 174, 128 118, 170 86 C 200 66, 238 58, 270 60 C 306 62, 340 74, 358 98 C 378 124, 382 168, 370 228"
          stroke-width="0.7"/>
    <!-- Left side — flowing, slight S-curve -->
    <path d="M132 228 C 124 268, 118 312, 122 354 C 126 392, 136 426, 154 458"
          stroke-width="0.6"/>
    <!-- Right side — straighter, creating asymmetry -->
    <path d="M370 228 C 374 270, 374 318, 370 356 C 364 392, 354 422, 336 452"
          stroke-width="0.6"/>
    <!-- Bottom — open arc, gentle -->
    <path d="M154 458 C 178 492, 216 508, 248 510 C 278 510, 310 494, 336 452"
          stroke-width="0.65"/>

    <!-- ============ TOP CENTER — Large garden rose ============ -->
    <g stroke-width="0.6">
      <!-- Main bloom sitting at apex of arch -->
      <path d="M240 68 C 234 58, 224 50, 218 42 C 214 36, 218 28, 226 28 C 232 28, 238 34, 240 40"/>
      <path d="M240 40 C 242 34, 248 28, 254 28 C 262 28, 266 36, 262 42 C 256 50, 246 58, 240 68"/>
      <!-- Outer petals -->
      <path d="M226 28 C 218 24, 210 28, 212 38 C 214 46, 222 50, 228 46"/>
      <path d="M254 28 C 262 24, 270 28, 268 38 C 266 46, 258 50, 252 46"/>
      <path d="M212 38 C 204 36, 198 42, 202 50 C 206 56, 216 58, 222 52"/>
      <path d="M268 38 C 276 36, 282 42, 278 50 C 274 56, 264 58, 258 52"/>
      <!-- Third layer -->
      <path d="M202 50 C 196 54, 196 62, 204 66 C 212 68, 222 64, 226 58"/>
      <path d="M278 50 C 284 54, 284 62, 276 66 C 268 68, 258 64, 254 58"/>
      <!-- Inner spiral -->
      <path d="M232 42 C 236 38, 244 38, 248 42 C 250 46, 246 50, 240 50 C 234 50, 230 46, 232 42"/>
      <path d="M236 44 C 238 42, 242 42, 244 44 C 244 46, 242 48, 240 48 C 238 48, 236 46, 236 44"/>
    </g>

    <!-- ============ TOP LEFT — Bud + leaves cascading ============ -->
    <g stroke-width="0.55">
      <!-- Stem from main frame -->
      <path d="M170 86 C 156 74, 140 66, 126 62"/>
      <!-- Rosebud -->
      <path d="M126 62 C 118 58, 110 60, 112 68 C 114 76, 122 78, 126 72"/>
      <path d="M126 72 C 128 66, 124 60, 120 62"/>
      <!-- Sepals -->
      <path d="M112 68 C 108 72, 104 68, 106 62 C 108 58, 114 56, 118 58"/>
      <!-- Leaves trailing from bud stem -->
      <path d="M142 72 C 130 64, 118 68, 116 80 C 126 82, 138 76, 142 72"/>
      <path d="M116 80 C 122 76, 132 72, 138 70" opacity="0.6"/>
      <path d="M152 78 C 140 86, 132 98, 138 110 C 148 106, 152 94, 152 78"/>
      <path d="M138 110 C 142 100, 148 92, 150 84" opacity="0.6"/>
    </g>

    <!-- Small accent leaves upper-left -->
    <g stroke-width="0.45" opacity="0.7">
      <path d="M148 108 C 136 104, 126 110, 128 122 C 138 120, 146 114, 148 108"/>
      <path d="M128 122 C 134 116, 142 112, 146 110"/>
    </g>

    <!-- ============ TOP RIGHT — Smaller bloom + trailing ============ -->
    <g stroke-width="0.55">
      <!-- Stem -->
      <path d="M330 90 C 346 78, 362 72, 374 68"/>
      <!-- Small open rose -->
      <path d="M374 68 C 380 62, 388 60, 392 66 C 394 72, 388 78, 382 78"/>
      <path d="M382 78 C 378 74, 376 66, 380 62"/>
      <path d="M392 66 C 398 64, 402 70, 398 76 C 394 80, 386 80, 382 76"/>
      <path d="M398 76 C 402 78, 404 84, 398 88 C 392 90, 384 86, 384 80"/>
      <!-- Leaf pair -->
      <path d="M358 76 C 368 82, 376 94, 372 106 C 364 100, 358 88, 358 76"/>
      <path d="M372 106 C 366 96, 362 86, 360 80" opacity="0.6"/>
      <path d="M348 84 C 356 92, 358 106, 352 116 C 346 108, 344 96, 348 84"/>
    </g>

    <!-- ============ LEFT SIDE — Fern fronds ============ -->
    <g stroke-width="0.5">
      <!-- Main fern stem -->
      <path d="M128 280 C 112 296, 100 318, 98 342"/>
      <!-- Frond pairs -->
      <path d="M118 290 C 108 284, 98 288, 98 298 C 106 298, 114 294, 118 290"/>
      <path d="M112 306 C 100 302, 90 308, 92 318 C 100 316, 110 310, 112 306"/>
      <path d="M106 322 C 94 320, 86 328, 90 336 C 98 334, 106 328, 106 322"/>
      <!-- Curling tip -->
      <path d="M98 342 C 94 350, 96 358, 102 356 C 106 352, 102 346, 98 346"/>
    </g>

    <!-- ============ RIGHT SIDE — Olive branch style ============ -->
    <g stroke-width="0.5">
      <!-- Main stem -->
      <path d="M374 286 C 388 302, 396 324, 394 348"/>
      <!-- Leaves alternating -->
      <path d="M382 296 C 392 290, 402 294, 400 304 C 394 306, 386 300, 382 296"/>
      <path d="M388 314 C 398 310, 408 316, 404 326 C 396 326, 390 320, 388 314"/>
      <path d="M392 334 C 400 330, 410 336, 406 344 C 398 344, 392 340, 392 334"/>
      <!-- Small berry accent -->
      <circle cx="400" cy="350" r="2" stroke-width="0.45"/>
      <circle cx="394" cy="358" r="1.6" stroke-width="0.4"/>
    </g>

    <!-- ============ BOTTOM — Trailing wisteria / vine ============ -->
    <!-- Bottom left — hanging vine with small blooms -->
    <g stroke-width="0.5">
      <path d="M188 498 C 172 508, 152 516, 136 518 C 122 518, 114 510, 118 498"/>
      <!-- Tiny hanging blooms -->
      <path d="M156 514 C 152 520, 148 526, 150 530 C 154 530, 156 524, 154 518" stroke-width="0.4"/>
      <path d="M140 516 C 136 522, 134 528, 138 530 C 142 528, 140 522, 138 518" stroke-width="0.4"/>
      <path d="M168 510 C 166 518, 162 524, 164 528 C 168 526, 168 520, 166 514" stroke-width="0.4"/>
      <!-- Leaf -->
      <path d="M126 508 C 118 502, 110 506, 114 514 C 120 514, 126 510, 126 508"/>
    </g>

    <!-- Bottom right — longer trailing, asymmetric -->
    <g stroke-width="0.5">
      <path d="M304 502 C 324 514, 348 522, 370 524 C 388 522, 398 512, 392 498"/>
      <!-- Leaves along trail -->
      <path d="M330 516 C 340 522, 350 520, 348 512 C 342 510, 334 514, 330 516"/>
      <path d="M358 522 C 366 526, 376 524, 374 516 C 368 514, 360 518, 358 522"/>
      <!-- Hanging blooms -->
      <path d="M344 520 C 342 528, 340 534, 344 536 C 348 534, 346 528, 342 522" stroke-width="0.4"/>
      <path d="M364 524 C 362 530, 360 536, 364 538 C 368 536, 366 530, 364 526" stroke-width="0.4"/>
      <path d="M380 520 C 378 526, 376 532, 380 534 C 384 532, 382 526, 378 522" stroke-width="0.4"/>
      <!-- Tendril curl at end -->
      <path d="M392 498 C 396 490, 400 488, 402 492 C 402 498, 396 500, 394 496" stroke-width="0.4"/>
    </g>

    <!-- Bottom center — small accent -->
    <g stroke-width="0.45" opacity="0.65">
      <path d="M236 514 C 232 520, 236 526, 242 524 C 246 520, 242 514, 238 516"/>
      <path d="M252 516 C 256 522, 252 528, 246 526 C 242 522, 248 516, 250 518"/>
    </g>

    <!-- ============ SCATTERED DETAIL ============ -->
    <g stroke-width="0.35" opacity="0.5">
      <circle cx="194" cy="72" r="1.2"/>
      <circle cx="288" cy="56" r="1"/>
      <circle cx="108" cy="248" r="1"/>
      <circle cx="388" cy="258" r="1"/>
      <path d="M210 64 C 214 58, 220 60, 218 66"/>
      <path d="M296 62 C 300 56, 306 58, 304 64"/>
    </g>
  </g>

  <!-- ============ EYEBROW — "save the date" as paths ============ -->
  <g fill="currentColor" opacity="0.55">
    <g transform="translate(168 194) scale(0.38)">
      <!-- s -->
      <path d="M0 24 C 2 18, 8 14, 14 14 C 20 14, 24 18, 24 22 C 24 26, 20 28, 14 30 C 8 32, 4 34, 4 38 C 4 42, 8 46, 16 46 C 22 46, 26 42, 28 38" stroke="currentColor" stroke-width="2" fill="none"/>
      <!-- a -->
      <path d="M40 28 C 40 22, 46 14, 54 14 C 62 14, 66 22, 66 30 L 66 46" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M66 32 C 62 28, 56 26, 50 28 C 44 30, 40 36, 42 42 C 44 46, 50 48, 56 46 C 62 44, 66 38, 66 34" stroke="currentColor" stroke-width="2" fill="none"/>
