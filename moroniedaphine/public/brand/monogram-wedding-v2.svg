      <path d="M78 14 L 90 46 L 102 14" stroke="currentColor" stroke-width="2" fill="none"/>
      <!-- e -->
      <path d="M114 30 C 114 24, 120 14, 130 14 C 140 14, 144 22, 144 30 L 114 30 C 114 38, 120 46, 130 46 C 138 46, 142 40, 144 36" stroke="currentColor" stroke-width="2" fill="none"/>
      <!-- t -->
      <path d="M170 6 L 170 46" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M160 16 L 180 16" stroke="currentColor" stroke-width="2" fill="none"/>
      <!-- h -->
      <path d="M194 2 L 194 46" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M194 24 C 200 16, 208 14, 214 16 C 220 20, 222 28, 222 46" stroke="currentColor" stroke-width="2" fill="none"/>
      <!-- e -->
      <path d="M236 30 C 236 24, 242 14, 252 14 C 262 14, 266 22, 266 30 L 236 30 C 236 38, 242 46, 252 46 C 260 46, 264 40, 266 36" stroke="currentColor" stroke-width="2" fill="none"/>
      <!-- d -->
      <path d="M304 2 L 304 46" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M304 30 C 300 22, 294 14, 284 16 C 276 18, 272 28, 274 36 C 276 44, 284 48, 292 46 C 298 44, 302 38, 304 32" stroke="currentColor" stroke-width="2" fill="none"/>
      <!-- a -->
      <path d="M320 28 C 320 22, 326 14, 334 14 C 342 14, 346 22, 346 30 L 346 46" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M346 32 C 342 28, 336 26, 330 28 C 324 30, 320 36, 322 42 C 324 46, 330 48, 336 46 C 342 44, 346 38, 346 34" stroke="currentColor" stroke-width="2" fill="none"/>
      <!-- t -->
      <path d="M362 6 L 362 46" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M352 16 L 372 16" stroke="currentColor" stroke-width="2" fill="none"/>
      <!-- e -->
      <path d="M386 30 C 386 24, 392 14, 402 14 C 412 14, 416 22, 416 30 L 386 30 C 386 38, 392 46, 402 46 C 410 46, 414 40, 416 36" stroke="currentColor" stroke-width="2" fill="none"/>
    </g>
  </g>

  <!-- Hairline rules -->
  <line x1="168" y1="214" x2="218" y2="214" stroke="currentColor" stroke-width="0.45" stroke-linecap="round" opacity="0.35"/>
  <line x1="268" y1="214" x2="318" y2="214" stroke="currentColor" stroke-width="0.45" stroke-linecap="round" opacity="0.35"/>

  <!-- ============ MONOGRAM — M & D as hand-lettered paths ============ -->
  <g stroke="currentColor" fill="currentColor" stroke-width="0.3">

    <!-- === LETTER M === -->
    <g transform="translate(130 240)">
      <path d="
        M 0 130 L 0 10 C 0 4, 3 0, 8 0 L 14 0 C 17 0, 19 3, 20 6
        L 50 94 C 52 100, 54 104, 56 108
        C 58 104, 60 100, 62 94
        L 92 6 C 93 3, 95 0, 98 0 L 104 0 C 109 0, 112 4, 112 10
        L 112 130
        L 104 130 C 102 130, 100 128, 100 124 L 100 24
        L 66 120 C 64 126, 62 128, 58 128
        L 54 128 C 50 128, 48 126, 46 120
        L 12 24 L 12 124 C 12 128, 10 130, 8 130 Z
        "
        fill="currentColor" stroke="none"/>
    </g>

    <!-- === AMPERSAND & === -->
    <!-- More ornamental italic version for v2 -->
    <g transform="translate(220 306)">
      <path d="
        M 44 52 C 38 58, 30 62, 22 62
        C 12 62, 2 54, 2 42 C 2 34, 8 26, 18 20
        L 12 12 C 8 6, 8 2, 12 -2 C 16 -4, 22 -4, 26 -2
        C 30 0, 32 4, 32 8 L 32 14
        C 32 18, 30 22, 26 26
        L 22 30 C 16 34, 12 38, 12 42
        C 12 48, 16 52, 24 52
        C 30 52, 36 48, 40 42
        Z
        "
        fill="currentColor" stroke="none" opacity="0.8"
        transform="skewX(-10)"/>
    </g>

    <!-- === LETTER D === -->
    <g transform="translate(270 240)">
      <path d="
        M 0 0 L 34 0
        C 64 0, 84 22, 84 65
        C 84 108, 64 130, 34 130
        L 0 130 Z
        M 12 12 L 12 118 L 32 118
        C 56 118, 72 100, 72 65
        C 72 30, 56 12, 32 12 Z
        "
        fill="currentColor" stroke="none"
        fill-rule="evenodd"/>
    </g>
  </g>

  <!-- ============ DECORATIVE HAIRLINE UNDER INITIALS ============ -->
  <g stroke="currentColor" stroke-linecap="round">
    <line x1="172" y1="386" x2="230" y2="386" stroke-width="0.45" opacity="0.4"/>
    <!-- Floral micro-ornament instead of diamond -->
    <g transform="translate(240 386)" stroke-width="0.4" opacity="0.45">
      <path d="M-4 0 C -4 -4, 0 -6, 4 -4 C 6 -2, 6 2, 4 4 C 2 6, -2 6, -4 4 C -6 2, -6 -2, -4 0 Z" fill="currentColor" stroke="none"/>
      <path d="M-8 0 C -8 -2, -6 -4, -4 -3" fill="none"/>
      <path d="M8 0 C 8 -2, 6 -4, 4 -3" fill="none"/>
    </g>
    <line x1="252" y1="386" x2="310" y2="386" stroke-width="0.45" opacity="0.4"/>
  </g>

