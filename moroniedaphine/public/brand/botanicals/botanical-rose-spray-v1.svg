<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" fill="none" stroke="currentColor" stroke-width="0.75" stroke-linecap="round" stroke-linejoin="round">
  <!-- Rose spray — hairline burgundy line-art, engraving feel -->
  <g opacity="0.95">
    <!-- main stem -->
    <path d="M120 310 C 118 260, 124 210, 120 160 S 112 90, 118 40"/>
    <!-- upper rose bloom (layered petals) -->
    <g transform="translate(118 42)">
      <circle cx="0" cy="0" r="3.2"/>
      <path d="M-4 -2 C -10 -8, -10 -18, -2 -20 S 12 -16, 10 -6 S 2 6, -4 -2 Z"/>
      <path d="M4 -2 C 12 -4, 18 -12, 14 -20 S 0 -24, -4 -16"/>
      <path d="M-6 2 C -16 0, -22 -10, -18 -20 S -4 -28, 4 -22"/>
      <path d="M6 4 C 18 6, 24 -4, 22 -14 S 10 -26, 0 -22"/>
      <path d="M-8 6 C -20 10, -28 0, -24 -12 S -10 -28, 2 -26"/>
      <path d="M0 8 C 14 14, 28 6, 26 -8 S 14 -30, -4 -28"/>
    </g>
    <!-- second rose -->
    <g transform="translate(136 120) scale(0.78)">
      <circle cx="0" cy="0" r="3"/>
      <path d="M-4 -2 C -10 -8, -10 -18, -2 -20 S 12 -16, 10 -6 S 2 6, -4 -2 Z"/>
      <path d="M4 -2 C 12 -4, 18 -12, 14 -20 S 0 -24, -4 -16"/>
      <path d="M-6 2 C -16 0, -22 -10, -18 -20 S -4 -28, 4 -22"/>
      <path d="M6 4 C 18 6, 24 -4, 22 -14 S 10 -26, 0 -22"/>
    </g>
    <!-- third smaller bud -->
    <g transform="translate(104 200) scale(0.55)">
      <path d="M-6 0 C -10 -12, -4 -22, 4 -20 S 14 -8, 8 2 C 2 8, -4 6, -6 0 Z"/>
      <path d="M-2 -4 C 0 -10, 6 -12, 8 -6"/>
    </g>
    <!-- leaves along stem -->
    <path d="M120 80 C 150 70, 172 82, 180 104 C 168 110, 146 104, 128 92" />
    <path d="M180 104 C 178 92, 176 82, 172 76"/>
    <path d="M120 150 C 92 142, 70 156, 64 180 C 78 186, 100 178, 116 162"/>
    <path d="M64 180 C 66 168, 70 158, 74 152"/>
    <path d="M122 230 C 148 224, 168 238, 172 260 C 160 264, 140 258, 126 242"/>
    <path d="M172 260 C 172 248, 170 238, 166 232"/>
    <path d="M118 276 C 96 272, 78 284, 74 302 C 86 306, 104 300, 116 288"/>
    <!-- leaf veins (very fine) -->
    <path d="M150 88 L 160 98" opacity="0.7"/>
    <path d="M92 168 L 82 178" opacity="0.7"/>
    <path d="M148 244 L 158 254" opacity="0.7"/>
  </g>
</svg>
