<!DOCTYPE html>
<!-- CONFIGURE: Replace PLACEHOLDER_SUPABASE_URL, PLACEHOLDER_SUPABASE_ANON_KEY, PLACEHOLDER_SUPABASE_SERVICE_KEY with real values -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M&D — Painel de Convidados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --wine: #2D0A0F;
      --wine-deep: #1A0508;
      --wine-mid: #4A1019;
      --wine-tint: #F7F0F1;
      --parchment: #FAF8F6;
      --white: #FFFFFF;
      --white-muted: rgba(255,255,255,0.82);
      --white-dim: rgba(255,255,255,0.40);
      --gold: #D4AF37;
      --gold-border: rgba(212,175,55,0.30);
      --fd: 'Fraunces', Georgia, serif;
      --fu: 'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--wine-deep);
      color: var(--white);
      font-family: var(--fu);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--wine);
      border-bottom: 1px solid var(--gold-border);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header__brand {
      font-family: var(--fd);
      font-weight: 300;
      font-size: 22px;
      font-variation-settings: "opsz" 72, "SOFT" 40, "WONK" 0;
      letter-spacing: .08em;
    }
    .header__brand i { font-style: italic; opacity: .5; padding: 0 .06em; }
    .header__sub {
      font-family: var(--fu);
      font-size: 10px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: var(--gold);
      opacity: .6;
      margin-top: 4px;
    }
    .header__refresh {
      font-family: var(--fu);
      font-size: 11px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--gold);
      opacity: .6;
      cursor: pointer;
      border: 1px solid var(--gold-border);
      padding: 8px 20px;
      background: transparent;
      transition: all 400ms;
    }
    .header__refresh:hover { opacity: 1; background: rgba(212,175,55,0.08); }

    /* ── STATS ── */
    .stats-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--gold-border);
      background: var(--wine-mid);
    }
    .stat {
      flex: 1;
      padding: 20px 24px;
      text-align: center;
      border-right: 1px solid var(--gold-border);
    }
    .stat:last-child { border-right: none; }
    .stat__num {
      font-family: var(--fd);
      font-weight: 300;
      font-size: 36px;
      font-variation-settings: "opsz" 72, "SOFT" 20, "WONK" 0;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat__label {
      font-family: var(--fu);
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .18em;
      opacity: .45;
    }

    /* ── FILTER TABS ── */
    .filters {
      padding: 0 32px;
      background: var(--wine);
      border-bottom: 1px solid var(--gold-border);
      display: flex;
      gap: 0;
      overflow-x: auto;
    }
    .filter-tab {
      font-family: var(--fu);
      font-size: 11px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .14em;
      padding: 16px 24px;
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--white-dim);
      white-space: nowrap;
      transition: all 300ms;
    }
    .filter-tab:hover { color: var(--white-muted); }
    .filter-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
      opacity: 1;
    }

    /* ── TABLE WRAPPER ── */
    .table-wrap {
      padding: 32px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }
    thead th {
      font-family: var(--fu);
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--gold);
      opacity: .5;
      padding: 0 16px 14px;
      text-align: left;
      border-bottom: 1px solid var(--gold-border);
    }
    tbody tr {
      border-bottom: 1px solid rgba(212,175,55,0.08);
      transition: background 300ms;
    }
    tbody tr:hover { background: rgba(212,175,55,0.04); }
    td {
      padding: 16px;
      font-family: var(--fu);
      font-size: 13px;
      font-weight: 300;
      color: var(--white-muted);
      vertical-align: top;
    }
    .td-name {
      font-family: var(--fd);
      font-weight: 300;
      font-size: 15px;
      font-variation-settings: "opsz" 48, "SOFT" 20, "WONK" 0;
      color: var(--white);
    }
    .companions-list {
      margin-top: 6px;
      font-size: 11px;
      opacity: .45;
      line-height: 1.7;
    }
    .companions-list span { display: block; }

    /* ── STATUS BADGE ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      font-family: var(--fu);
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .14em;
    }
    .badge--pendente   { color: var(--gold); border: 1px solid rgba(212,175,55,0.35); }
    .badge--confirmado { color: #6FCF97; border: 1px solid rgba(111,207,151,0.35); }
    .badge--recusado   { color: #EB5757; border: 1px solid rgba(235,87,87,0.35); }

    /* ── STATUS SELECT ── */
    .status-select {
      font-family: var(--fu);
      font-size: 11px;
      font-weight: 300;
      color: var(--white-muted);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--gold-border);
      padding: 6px 10px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: border-color 300ms;
      min-width: 140px;
    }
    .status-select:hover { border-color: rgba(212,175,55,0.55); }

    /* ── FONTE TAG ── */
    .fonte-tag {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .14em;
      padding: 2px 8px;
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--white-dim);
    }

    /* ── EMPTY / LOADING STATE ── */
    .state-msg {
      text-align: center;
      padding: 64px 32px;
      font-family: var(--fd);
      font-weight: 300;
      font-size: 20px;
      font-variation-settings: "opsz" 72, "SOFT" 30, "WONK" 0;
      color: var(--white-dim);
    }

    /* ── GOLD DIVIDER ── */
    .gold-line {
      width: 40px;
      height: 1px;
      background: var(--gold);
      opacity: .3;
      margin: 0 auto 4px;
      display: block;
    }

    /* ── KANBAN MESAS ── */
    .kanban-wrap { padding: 32px; display: none; }
    .kanban-wrap.active { display: block; }
    .kanban-toolbar {
      display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .kanban-toolbar button {
      font-family: var(--fu); font-size: 11px; font-weight: 400; text-transform: uppercase;
      letter-spacing: .12em; padding: 8px 20px; cursor: pointer; border: 1px solid var(--gold-border);
      background: transparent; color: var(--gold); opacity: .7; transition: all 300ms;
    }
    .kanban-toolbar button:hover { opacity: 1; background: rgba(212,175,55,0.08); }
    .kanban-toolbar .mesa-count {
      font-family: var(--fu); font-size: 12px; color: var(--white-dim); margin-left: auto;
    }
    .kanban-board {
      display: flex; gap: 20px; overflow-x: auto; padding-bottom: 16px;
      min-height: 400px; align-items: flex-start;
    }
    .kanban-col {
      min-width: 260px; max-width: 300px; flex-shrink: 0;
      background: var(--wine); border: 1px solid var(--gold-border); display: flex; flex-direction: column;
      overflow: hidden; transition: opacity 200ms, transform 200ms;
    }
    .kanban-col.col-dragging { opacity: .35; transform: scale(0.96); }
    .kanban-col.col-drag-over { border-color: var(--gold); box-shadow: 0 0 16px rgba(212,175,55,0.25); transform: scale(1.02); }
    .kanban-col--unassigned { border-style: dashed; opacity: .8; }
    .kanban-col-color-bar { height: 5px; width: 100%; transition: background 300ms; }
    .kanban-col-header {
      padding: 14px 16px; border-bottom: 1px solid var(--gold-border);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .kanban-col-drag-handle {
      cursor: grab; padding: 4px 2px; color: var(--white-dim); opacity: .2; transition: opacity 200ms;
      display: flex; align-items: center; flex-shrink: 0;
    }
    .kanban-col-drag-handle:hover { opacity: .7; color: var(--gold); }
    .kanban-col-drag-handle:active { cursor: grabbing; opacity: 1; }
    .kanban-col-drag-handle svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; }
    .kanban-col-title {
      font-family: var(--fd); font-weight: 300; font-size: 16px;
      font-variation-settings: "opsz" 72, "SOFT" 30, "WONK" 0;
      cursor: pointer; transition: color 200ms; flex: 1;
    }
    .kanban-col-title:hover { color: var(--gold); }
    .kanban-col-count {
      font-family: var(--fu); font-size: 10px; letter-spacing: .08em;
      color: var(--white-dim); white-space: nowrap;
    }
    .kanban-col-tools {
      display: flex; align-items: center; gap: 4px;
    }
    .kanban-col-tools button {
      background: none; border: none; cursor: pointer; padding: 4px; color: var(--white-dim);
      opacity: .4; transition: all 200ms; display: flex; align-items: center; justify-content: center;
    }
    .kanban-col-tools button:hover { opacity: 1; color: var(--gold); }
    .kanban-col-tools button svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    .kanban-col-body {
      padding: 10px; min-height: 60px; flex: 1;
      display: flex; flex-direction: column; gap: 6px;
    }
    .kanban-col-body.drag-over { background: rgba(212,175,55,0.06); }
    .kanban-card {
      padding: 10px 12px; border: 1px solid rgba(212,175,55,0.10);
      background: var(--wine-deep); cursor: grab; transition: all 200ms;
    }
    .kanban-card:active { cursor: grabbing; }
    .kanban-card.dragging { opacity: .4; }
    .kanban-card-name {
      font-family: var(--fd); font-weight: 300; font-size: 13px;
      font-variation-settings: "opsz" 48, "SOFT" 20, "WONK" 0; color: var(--white);
    }
    .kanban-card-comp {
      font-family: var(--fu); font-size: 10px; color: var(--white-dim);
      margin-top: 3px; line-height: 1.5;
    }
    .kanban-card-fonte {
      font-family: var(--fu); font-size: 9px; text-transform: uppercase;
      letter-spacing: .1em; color: var(--gold); opacity: .4; margin-top: 4px;
    }
    .kanban-col-footer {
      padding: 0; border-top: 1px solid rgba(212,175,55,0.06);
    }
    .kanban-color-picker {
      display: none; gap: 5px; padding: 10px 12px; flex-wrap: wrap;
      background: rgba(0,0,0,0.15);
    }
    .kanban-color-picker.open { display: flex; }
    .kanban-color-dot {
      width: 20px; height: 20px; cursor: pointer; border: 2px solid rgba(255,255,255,0.08);
      transition: all 200ms;
    }
    .kanban-color-dot:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.3); }
    .kanban-color-dot.active { border-color: var(--white); box-shadow: 0 0 6px rgba(255,255,255,0.2); }

    @media (max-width: 768px) {
      .stats-bar { flex-wrap: wrap; }
      .stat { flex: 1 1 50%; }
      .header { flex-direction: column; gap: 16px; align-items: flex-start; }
      .table-wrap { padding: 16px; }
      .kanban-wrap { padding: 16px; }
      .kanban-col { min-width: 220px; }
    }

    /* RECEPCAO */
    .recepcao-wrap { display: none; padding-bottom: 40px; }
    .recepcao-wrap.active { display: block; }
    .recepcao-stats {
      display: flex; gap: 0; border-bottom: 1px solid var(--gold-border); background: var(--wine-mid);
    }
    .recepcao-stats .stat { flex: 1; padding: 16px 12px; text-align: center; border-right: 1px solid var(--gold-border); }
    .recepcao-stats .stat:last-child { border-right: none; }
    .recepcao-stats .stat__num { font-family: var(--fd); font-weight: 300; font-size: 28px; font-variation-settings: "opsz" 72, "SOFT" 20, "WONK" 0; color: var(--white); }
    .recepcao-stats .stat__lbl { font-family: var(--fu); font-size: 9px; text-transform: uppercase; letter-spacing: .14em; color: var(--white-dim); margin-top: 4px; }
    .recepcao-section-label {
      font-family: var(--fu); font-size: 10px; font-weight: 400; text-transform: uppercase;
      letter-spacing: .16em; color: var(--gold); opacity: .6; padding: 20px 24px 12px; display: block;
    }
    .recepcao-card {
      margin: 0 16px 12px; padding: 20px; border: 1px solid var(--gold-border); background: var(--wine);
      transition: all 400ms;
    }
    .recepcao-card--arrived {
      border-color: rgba(111,207,151,0.3); background: rgba(111,207,151,0.06);
    }
    .recepcao-card__header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .recepcao-card__status {
      font-family: var(--fu); font-size: 9px; text-transform: uppercase; letter-spacing: .14em;
    }
    .recepcao-card__status--waiting { color: var(--gold); opacity: .6; }
    .recepcao-card__status--arrived { color: #6FCF97; }
    .recepcao-card__mesa {
      font-family: var(--fu); font-size: 10px; font-weight: 500; letter-spacing: .12em;
      text-transform: uppercase; color: var(--white); background: var(--wine-mid);
      padding: 4px 12px; border: 1px solid var(--gold-border);
    }
    .recepcao-card--arrived .recepcao-card__mesa {
      background: rgba(111,207,151,0.15); border-color: rgba(111,207,151,0.3); color: #6FCF97;
    }
    .recepcao-person {
      display: flex; align-items: center; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid rgba(212,175,55,0.06); cursor: pointer; transition: background 200ms;
    }
    .recepcao-person:last-child { border-bottom: none; }
    .recepcao-person:hover { background: rgba(212,175,55,0.03); }
    .recepcao-person__check {
      width: 22px; height: 22px; border: 1px solid var(--gold-border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all 300ms;
    }
    .recepcao-person__check.checked {
      background: #6FCF97; border-color: #6FCF97;
    }
    .recepcao-person__check.checked::after {
      content: ''; width: 6px; height: 10px;
      border: 2px solid var(--wine-deep); border-top: none; border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }
    .recepcao-person__name {
      font-family: var(--fd); font-weight: 300; font-size: 15px;
      font-variation-settings: "opsz" 48, "SOFT" 20, "WONK" 0; color: var(--white);
    }
    .recepcao-person--comp .recepcao-person__name {
      font-family: var(--fu); font-size: 13px; font-weight: 300; color: var(--white-muted);
    }
    .recepcao-card__actions {
      margin-top: 16px; display: flex; gap: 12px; align-items: center;
    }
    .recepcao-card__btn {
      padding: 10px 24px; font-family: var(--fu); font-size: 11px; font-weight: 500;
      letter-spacing: .14em; text-transform: uppercase; cursor: pointer; border: none;
      background: var(--gold); color: var(--wine-deep); transition: opacity 300ms;
    }
    .recepcao-card__btn:hover { opacity: .85; }
    .recepcao-card__btn:disabled { opacity: .3; cursor: not-allowed; }
    .recepcao-card__time {
      font-family: var(--fu); font-size: 11px; color: #6FCF97; opacity: .8;
    }
    .recepcao-empty {
      padding: 48px 24px; text-align: center; font-family: var(--fu); font-size: 13px;
      color: var(--white-dim);
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div>
    <p class="header__brand">M<i>&amp;</i>D</p>
    <p class="header__sub">Painel de Convidados</p>
  </div>
  <button class="header__refresh" onclick="renderGuests()">Atualizar</button>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat__num" id="stat-total-pessoas">—</div>
    <div class="stat__label">Total Pessoas</div>
    <div class="stat__detail" id="stat-total-detail" style="font-size:10px;opacity:.4;margin-top:4px;"></div>
  </div>
  <div class="stat" style="background:rgba(111,207,151,0.06);">
    <div class="stat__num" id="stat-confirmados-pessoas" style="color:#6FCF97;">—</div>
    <div class="stat__label">Confirmados</div>
    <div class="stat__detail" id="stat-confirmados-detail" style="font-size:10px;opacity:.4;margin-top:4px;"></div>
  </div>
  <div class="stat">
    <div class="stat__num" id="stat-pendentes">—</div>
    <div class="stat__label">Pendentes</div>
    <div class="stat__detail" id="stat-pendentes-detail" style="font-size:10px;opacity:.4;margin-top:4px;"></div>
  </div>
  <div class="stat">
    <div class="stat__num" id="stat-recusados" style="opacity:.5;">—</div>
    <div class="stat__label">Recusados</div>
  </div>
</div>

<!-- FILTER TABS -->
<nav class="filters">
  <button class="filter-tab active" data-status="todos" onclick="setFilter('todos', this)">Todos</button>
  <button class="filter-tab" data-status="confirmado" onclick="setFilter('confirmado', this)" style="color:#6FCF97;font-weight:500;">Confirmados</button>
  <button class="filter-tab" data-status="mesas" onclick="setFilter('mesas', this)" style="color:#6FCF97;">Mesas</button>
  <span style="width:1px;height:20px;background:var(--gold-border);margin:0 16px;"></span>
  <button class="filter-tab" data-status="pendente" onclick="setFilter('pendente', this)" style="opacity:.5;">Pendentes</button>
  <button class="filter-tab" data-status="recusado" onclick="setFilter('recusado', this)" style="opacity:.5;">Recusados</button>
  <span style="width:1px;height:20px;background:var(--gold-border);margin:0 16px;"></span>
  <button class="filter-tab" data-status="recepcao" onclick="setFilter('recepcao', this)" style="color:#FFD700;font-weight:500;">Recepção</button>
</nav>

<!-- TABLE -->
<div class="table-wrap" id="table-view">
  <div id="table-container">
    <div class="state-msg" id="loading-msg">Carregando convidados...</div>
  </div>
</div>

<!-- KANBAN MESAS -->
<div class="kanban-wrap" id="kanban-view">
  <div class="kanban-toolbar">
    <button onclick="addMesa()">+ Nova Mesa</button>
    <button onclick="saveMesas()">Salvar Layout</button>
    <button onclick="resetMesas()">Resetar</button>
    <span class="mesa-count" id="mesa-stats"></span>
  </div>
  <div class="kanban-board" id="kanban-board"></div>
</div>

<!-- RECEPCAO VIEW -->
<div class="recepcao-wrap" id="recepcao-view">
  <div class="recepcao-stats" id="recepcao-stats"></div>
  <div style="padding:16px 24px;">
    <input type="text" id="recepcao-search" placeholder="Buscar convidado ou acompanhante..." style="width:100%;padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--gold-border);color:var(--white);font-family:var(--fu);font-size:15px;font-weight:300;" oninput="filterRecepcao(this.value)">
  </div>
  <div id="recepcao-board"></div>
</div>

<script>
  const SUPABASE_URL = 'https://weirdpigeon-supabase.cloudfy.live';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3NzM3Njg1MTYsImV4cCI6MTgwNTMwNDUxNn0.Hziwx8ocWnFVLHvt5DhT8nTkL2XVMa58ofjL-0hCMxw';

  let currentFilter = 'todos';
  let allGuests = [];

  async function loadGuests() {
    let url = SUPABASE_URL + '/rest/v1/wedding_guests?select=*,wedding_companions(*)&order=created_at.desc';
    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    return res.json();
  }

  async function updateStatus(id, newStatus) {
    await fetch(SUPABASE_URL + '/rest/v1/wedding_guests?id=eq.' + id, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      },
      body: JSON.stringify({ status: newStatus, updated_at: new Date().toISOString() })
    });
    await renderGuests();
  }

  async function deleteGuest(id, nome) {
    if (!confirm('Deletar "' + nome + '" e todos os acompanhantes?')) return;
    await fetch(SUPABASE_URL + '/rest/v1/wedding_companions?guest_id=eq.' + id, {
      method: 'DELETE',

  function copyLink(id, nome, btn) {
    const link = 'https://moroniedaphine.vercel.app/confirmar?id=' + id;
    navigator.clipboard.writeText(link).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copiado!';
      btn.style.color = '#4CAF50';
      btn.style.borderColor = '#4CAF50';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 2000);
    });

  function setFilter(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    const tableView = document.getElementById('table-view');
    const kanbanView = document.getElementById('kanban-view');
    const recepcaoView = document.getElementById('recepcao-view');

    if (status === 'mesas') {
      tableView.style.display = 'none';
      kanbanView.classList.add('active');
      recepcaoView.classList.remove('active');
      drawKanban();
    } else if (status === 'recepcao') {
      tableView.style.display = 'none';
      kanbanView.classList.remove('active');
      recepcaoView.classList.add('active');
      drawRecepcao();
    } else {
      tableView.style.display = '';
      kanbanView.classList.remove('active');
      recepcaoView.classList.remove('active');
      drawTable();
    }
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' }) +
           ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function badgeHTML(status) {
    let s = (status || 'pendente').toLowerCase();
    // Map old statuses to pendente
    if (s === 'aprovado' || s === 'enviado') s = 'pendente';
    const labels = {
      pendente: 'Pendente',
      confirmado: 'Confirmado',
      recusado: 'Recusado'
    };
    return `<span class="badge badge--${s}">${labels[s] || s}</span>`;
  }

  function drawTable() {
    const container = document.getElementById('table-container');

    // Stats (always from allGuests regardless of filter)
    function countPeople(list) {
      let convites = list.length;
      let acomp = 0;
      list.forEach(g => {
        const comps = Array.isArray(g.wedding_companions) ? g.wedding_companions.length : 0;
        const declared = g.acompanhantes != null ? parseInt(g.acompanhantes) : 0;
        acomp += Math.max(comps, declared);
      });
      return { convites, acomp, total: convites + acomp };
    }

    const casamentoGuests = allGuests.filter(g => !(g.mensagem && g.mensagem.includes('[CHA-COZINHA]')));

    const all = countPeople(casamentoGuests);
    const conf = countPeople(casamentoGuests.filter(g => g.status === 'confirmado'));
    const pend = countPeople(casamentoGuests.filter(g => !g.status || g.status === 'pendente' || g.status === 'aprovado' || g.status === 'enviado'));
    const recusados = casamentoGuests.filter(g => g.status === 'recusado').length;

    document.getElementById('stat-total-pessoas').textContent = all.total;
    document.getElementById('stat-total-detail').textContent = all.convites + ' convites + ' + all.acomp + ' acomp.';
    // Count kids in confirmed
    let confKids = 0;
    casamentoGuests.filter(g => g.status === 'confirmado').forEach(g => {
      const comps = Array.isArray(g.wedding_companions) ? g.wedding_companions : [];
      comps.forEach(c => { if (c.idade && c.idade < 7) confKids++; });
    });
    document.getElementById('stat-confirmados-pessoas').textContent = conf.total;
    document.getElementById('stat-confirmados-detail').textContent = conf.convites + ' convites + ' + conf.acomp + ' acomp.' + (confKids > 0 ? ' (' + confKids + ' crian\u00e7as)' : '');
    document.getElementById('stat-pendentes').textContent = pend.total;
    document.getElementById('stat-pendentes-detail').textContent = pend.convites + ' convites + ' + pend.acomp + ' acomp.';
    document.getElementById('stat-recusados').textContent = recusados;

    // Filter
    let guests;
    if (currentFilter === 'todos') {
      guests = casamentoGuests;
    } else if (currentFilter === 'pendente') {
      guests = casamentoGuests.filter(g => {
        const s = g.status || 'pendente';
        return s === 'pendente' || s === 'aprovado' || s === 'enviado';
      });
    } else {
      guests = casamentoGuests.filter(g => {
        const s = g.status || 'pendente';
        return s === currentFilter;
      });
    }

    if (!guests.length) {
      container.innerHTML = '<div class="state-msg">Nenhum convidado encontrado.</div>';
      return;
    }

    let rows = guests.map(g => {
      const comps = Array.isArray(g.wedding_companions) ? g.wedding_companions : [];
      const compHTML = comps.length
        ? `<div class="companions-list">${comps.map(c => `<span>${c.nome}${c.idade ? ', ' + c.idade + ' anos' : ''}</span>`).join('')}</div>`
        : '';

      const statusOptions = ['pendente','confirmado','recusado'];
      const currentStatus = g.status || 'pendente';
      // Map old statuses to pendente for display
      const displayStatus = (currentStatus === 'aprovado' || currentStatus === 'enviado') ? 'pendente' : currentStatus;
      const selectOptions = statusOptions.map(s => {
        const labels = { pendente:'Pendente', confirmado:'Confirmado', recusado:'Recusado' };
        return `<option value="${s}" ${s === displayStatus ? 'selected' : ''}>${labels[s]}</option>`;
      }).join('');

      const restricoes = g.restricoes_alimentares ? `<div style="font-size:11px;opacity:.45;margin-top:4px;">${g.restricoes_alimentares}</div>` : '';
      const mensagem = g.mensagem ? `<div style="font-size:11px;opacity:.45;margin-top:4px;font-style:italic;">"${g.mensagem}"</div>` : '';

      return `
        <tr>
          <td>
            <div class="td-name">${g.nome || '—'}</div>
            ${compHTML}
          </td>
          <td>${g.whatsapp || '—'}</td>
          <td>${g.acompanhantes != null ? g.acompanhantes : (comps.length || '0')}</td>
          <td><span class="fonte-tag">${g.fonte || '—'}</span></td>
          <td>${badgeHTML(displayStatus)}</td>
          <td>${formatDate(g.created_at)}</td>
          <td>
            <button onclick="copyLink('${g.id}','${(g.nome||'').replace(/'/g,"\\'")}',this)" style="display:block;margin-bottom:6px;padding:4px 12px;background:transparent;border:1px solid var(--gold-border);color:var(--gold);font-family:var(--fu);font-size:10px;letter-spacing:.06em;cursor:pointer;transition:all .3s;white-space:nowrap;" onmouseenter="this.style.background='rgba(212,175,55,0.12)'" onmouseleave="this.style.background='transparent'">Copiar Link</button>
            <select class="status-select" onchange="updateStatus('${g.id}', this.value)">
              ${selectOptions}
            </select>
            <button onclick="deleteGuest('${g.id}', '${(g.nome||'').replace(/'/g,"\\'")}');" style="display:block;margin-top:8px;padding:4px 12px;background:transparent;border:1px solid rgba(200,50,50,0.3);color:rgba(200,50,50,0.6);font-family:var(--fu);font-size:10px;letter-spacing:.08em;cursor:pointer;transition:all .3s;" onmouseenter="this.style.background='rgba(200,50,50,0.15)';this.style.color='#c03232'" onmouseleave="this.style.background='transparent';this.style.color='rgba(200,50,50,0.6)'">Deletar</button>
            ${restricoes}
            ${mensagem}
          </td>
        </tr>
      `;
    }).join('');

    const tableHeaders = '<th>Nome</th><th>WhatsApp</th><th>Acomp.</th><th>Fonte</th><th>Status</th><th>Data</th><th>Ações</th>';

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            ${tableHeaders}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  async function loadMesasLayoutFromDB() {
    try {

        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }

      const rows = await res.json();
      if (Array.isArray(rows) && rows.length > 0 && rows[0].value) {
        mesasCache = rows[0].value;
        return mesasCache;
      }
    } catch(e) { console.error('Erro ao carregar mesas do DB:', e); }
    // First time or error: use initial layout and save
    mesasCache = INITIAL_MESAS;
    await saveMesasLayoutToDB(INITIAL_MESAS);
    return INITIAL_MESAS;
  }

  async function saveMesasLayoutToDB(layout) {
    mesasCache = layout;
    try {
      // Upsert: try PATCH first, if no row exists do POST
      const res = await fetch(SUPABASE_URL + '/rest/v1/wedding_settings?key=eq.mesas_layout', {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ value: layout, updated_at: new Date().toISOString() })
      });
      // If PATCH updated 0 rows, insert
      if (res.status === 200 || res.status === 204) {
        const text = await res.text();
        // Check via a GET if the row exists
        const check = await fetch(SUPABASE_URL + '/rest/v1/wedding_settings?key=eq.mesas_layout&select=key', {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        });
        const rows = await check.json();
        if (!Array.isArray(rows) || rows.length === 0) {
          await fetch(SUPABASE_URL + '/rest/v1/wedding_settings', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_KEY,
              'Authorization': 'Bearer ' + SUPABASE_KEY,
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ key: 'mesas_layout', value: layout, updated_at: new Date().toISOString() })
          });
        }
      }
    } catch(e) { console.error('Erro ao salvar mesas no DB:', e); }
  }

  async function drawKanban() {
    const board = document.getElementById('kanban-board');
    board.innerHTML = '<div class="state-msg">Carregando mesas...</div>';
    const confirmed = getConfirmedGuests();
    await loadMesasLayoutFromDB();
    const layout = loadMesasLayout();

    // layout = { "Mesa 1": ["guest-id-1", "guest-id-2"], "Mesa 2": [...] }
    const mesaNames = Object.keys(layout).sort((a,b) => {
      const ma = a.match(/Mesa (\d+)/);
      const mb = b.match(/Mesa (\d+)/);
      const na = ma ? parseInt(ma[1]) : 0;
      const nb = mb ? parseInt(mb[1]) : 0;
      return na - nb;
    });

    // Find unassigned guests
    const assignedIds = new Set();
    mesaNames.forEach(m => (layout[m] || []).forEach(id => assignedIds.add(id)));
    const unassigned = confirmed.filter(g => !assignedIds.has(g.id));

    // Count people per mesa
    function countMesaPeople(guestIds) {
      let total = 0;
      guestIds.forEach(id => {
        const g = confirmed.find(x => x.id === id);
        if (!g) return;
        total += 1;
        const comps = Array.isArray(g.wedding_companions) ? g.wedding_companions.length : 0;
        total += comps;
      });
      return total;
    }

    function guestCard(g) {
      const comps = Array.isArray(g.wedding_companions) ? g.wedding_companions : [];
      const compHTML = comps.map(c => `<div>${c.nome}${c.idade ? ', ' + c.idade : ''}</div>`).join('');
      const totalPeople = 1 + comps.length;
      return `
        <div class="kanban-card" draggable="true" data-guest-id="${g.id}">
          <div class="kanban-card-name">${g.nome || '—'} <span style="font-family:var(--fu);font-size:10px;opacity:.35;">(${totalPeople})</span></div>
          ${compHTML ? `<div class="kanban-card-comp">${compHTML}</div>` : ''}
          <div class="kanban-card-fonte">${g.fonte || ''}</div>
        </div>
      `;
    }

    function mesaColumn(name, guestIds, isUnassigned) {
      const guests = guestIds.map(id => confirmed.find(g => g.id === id)).filter(Boolean);
      const people = countMesaPeople(guestIds);
      const mesaColor = mesaColorsData[name] || 'transparent';
      const colorBarStyle = mesaColor !== 'transparent' ? `background:${mesaColor};` : 'background:var(--gold-border);opacity:.2;';
      const escapedName = name.replace(/'/g,"\\'");
      const colorDots = MESA_COLORS.map(c => {
        const active = (mesaColor === c.hex) ? ' active' : '';
        const bg = c.hex === 'transparent' ? 'var(--wine-mid)' : c.hex;
        return `<div class="kanban-color-dot${active}" style="background:${bg};" title="${c.name}" onclick="setMesaColor('${escapedName}','${c.hex}')"></div>`;
      }).join('');
      const colId = 'mesa-col-' + name.replace(/\W/g,'_');
      return `
        <div class="kanban-col ${isUnassigned ? 'kanban-col--unassigned' : ''}" data-mesa="${name}" id="${colId}">
          <div class="kanban-col-color-bar" style="${colorBarStyle}"></div>
          <div class="kanban-col-header">
            ${!isUnassigned ? `<span class="kanban-col-drag-handle" draggable="true" title="Arrastar mesa"><svg viewBox="0 0 24 24"><path d="M8 6h2M8 10h2M8 14h2M8 18h2M14 6h2M14 10h2M14 14h2M14 18h2"/></svg></span>` : ''}
            <span class="kanban-col-title" onclick="renameMesa('${escapedName}')" title="Clique para renomear">${name}</span>
            <span class="kanban-col-count">${people}p</span>
            ${!isUnassigned ? `
              <div class="kanban-col-tools">
                <button onclick="toggleColorPicker('${colId}')" title="Cor da mesa">
                  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/>${mesaColor !== 'transparent' ? `<circle cx="12" cy="12" r="5" fill="${mesaColor}" stroke="none"/>` : ''}</svg>
                </button>
              </div>
            ` : ''}
          </div>
          ${!isUnassigned ? `<div class="kanban-color-picker" id="${colId}-colors">${colorDots}</div>` : ''}
          <div class="kanban-col-body" data-mesa-drop="${name}">
            ${guests.map(g => guestCard(g)).join('')}
          </div>
        </div>
      `;
    }

    let html = mesaColumn('Sem Mesa', unassigned.map(g => g.id), true);
    mesaNames.forEach(name => {
      html += mesaColumn(name, layout[name] || [], false);
    });

    board.innerHTML = html;

    // Stats
    const totalPeople = confirmed.reduce((sum, g) => {
      return sum + 1 + (Array.isArray(g.wedding_companions) ? g.wedding_companions.length : 0);
    }, 0);
    const assignedPeople = mesaNames.reduce((sum, m) => sum + countMesaPeople(layout[m] || []), 0);
    document.getElementById('mesa-stats').textContent =
      `${confirmed.length} confirmados · ${totalPeople} pessoas · ${mesaNames.length} mesas · ${totalPeople - assignedPeople} sem mesa`;

    // Drag and drop
    initDragDrop();
  }

  function initDragDrop() {
    let draggedId = null;
    let draggedColName = null;

    // ── Card drag ──
    document.querySelectorAll('.kanban-card').forEach(card => {
      card.addEventListener('dragstart', e => {
        e.stopPropagation();
        draggedId = card.dataset.guestId;
        draggedColName = null;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        document.querySelectorAll('.kanban-col-body').forEach(b => b.classList.remove('drag-over'));
      });
    });

    // ── Column drag (only from handle) — INSERT, not swap ──
    document.querySelectorAll('.kanban-col-drag-handle').forEach(handle => {
      handle.addEventListener('dragstart', e => {
        e.stopPropagation();
        var col = handle.closest('.kanban-col');
        draggedColName = col.getAttribute('data-mesa');
        draggedId = null;
        col.classList.add('col-dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setDragImage(col, 130, 30);
      });
      handle.addEventListener('dragend', () => {
        document.querySelectorAll('.kanban-col').forEach(c => {
          c.classList.remove('col-dragging');
          c.classList.remove('col-drag-over');
        });
        draggedColName = null;
      });
    });

    // Column + card drop targets on each column
    document.querySelectorAll('.kanban-col').forEach(col => {
      col.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        // Column drag highlight
        var colMesa = col.getAttribute('data-mesa');
        if (draggedColName && draggedColName !== colMesa && colMesa !== 'Sem Mesa') {
          col.classList.add('col-drag-over');
        }
      });
      col.addEventListener('dragleave', e => {
        // Only remove if truly leaving the column (not entering a child)
        if (!col.contains(e.relatedTarget)) {
          col.classList.remove('col-drag-over');
        }
      });
      col.addEventListener('drop', e => {
        col.classList.remove('col-drag-over');

        // Column drop — INSERT at target position
        if (draggedColName) {
          e.preventDefault();
          e.stopPropagation();
          var targetName = col.getAttribute('data-mesa');
          if (!targetName || draggedColName === targetName || targetName === 'Sem Mesa') return;

          var layout = loadMesasLayout();
          // Sort keys by number
          var sortedKeys = Object.keys(layout).sort(function(a,b) {
            var ma = a.match(/Mesa (\d+)/), mb = b.match(/Mesa (\d+)/);
            return (ma ? parseInt(ma[1]) : 0) - (mb ? parseInt(mb[1]) : 0);
          });

          var fromIdx = sortedKeys.indexOf(draggedColName);
          var toIdx = sortedKeys.indexOf(targetName);
          if (fromIdx === -1 || toIdx === -1) return;

          // Remove from current position, insert at target
          sortedKeys.splice(fromIdx, 1);
          sortedKeys.splice(toIdx, 0, draggedColName);

          // Rebuild layout with new numbering: Mesa 1, Mesa 2, ...
          var newLayout = {};
          var newColors = {};
          sortedKeys.forEach(function(oldKey, i) {
            var num = i + 1;
            var label = oldKey.replace(/^Mesa \d+/, '').trim();
            var newKey = 'Mesa ' + num + (label ? ' ' + label : '');
            newLayout[newKey] = layout[oldKey];
            if (mesaColorsData[oldKey]) newColors[newKey] = mesaColorsData[oldKey];
          });

          mesaColorsData = newColors;
          saveMesaColors();
          mesasCache = newLayout;
          localStorage.setItem(MESAS_KEY, JSON.stringify(newLayout));
          drawKanban();
          draggedColName = null;
          return;
        }

        // Card drop
        if (draggedId) {
          e.preventDefault();
          var dropBody = col.querySelector('.kanban-col-body');
          var targetMesa = dropBody ? dropBody.getAttribute('data-mesa-drop') : col.getAttribute('data-mesa');
          if (!targetMesa) return;
          var layout = loadMesasLayout();

          Object.keys(layout).forEach(m => {
            layout[m] = (layout[m] || []).filter(id => id !== draggedId);
          });

          if (targetMesa !== 'Sem Mesa') {
            if (!layout[targetMesa]) layout[targetMesa] = [];
            layout[targetMesa].push(draggedId);
          }

          saveMesasLayout(layout);
          drawKanban();
          draggedId = null;
        }
      });
    });

    // Card drag-over highlight on body
    document.querySelectorAll('.kanban-col-body').forEach(dropZone => {
      dropZone.addEventListener('dragover', e => {
        if (!draggedId) return;
        e.preventDefault();
        dropZone.classList.add('drag-over');
      });
      dropZone.addEventListener('dragleave', e => {
        if (!dropZone.contains(e.relatedTarget)) {
          dropZone.classList.remove('drag-over');
        }
      });
      dropZone.addEventListener('drop', () => {
        dropZone.classList.remove('drag-over');
      });
    });
  }

  function addMesa() {
    const layout = loadMesasLayout();
    const existing = Object.keys(layout).length;
    const name = prompt('Nome da mesa:', 'Mesa ' + (existing + 1));
    if (!name || !name.trim()) return;
    layout[name.trim()] = [];
    saveMesasLayout(layout);
    drawKanban();
  }

  function renameMesa(oldName) {
    const newName = prompt('Novo nome:', oldName);
    if (!newName || !newName.trim() || newName.trim() === oldName) return;
    const layout = loadMesasLayout();
    layout[newName.trim()] = layout[oldName] || [];
    delete layout[oldName];
    // Carry over color
    if (mesaColorsData[oldName]) {
      mesaColorsData[newName.trim()] = mesaColorsData[oldName];
      delete mesaColorsData[oldName];
      saveMesaColors();
    }
    saveMesasLayout(layout);
    drawKanban();
  }

  function deleteMesa(name) {
    if (!confirm('Remover "' + name + '"? Os convidados voltarão para "Sem Mesa".')) return;
    const layout = loadMesasLayout();
    delete layout[name];
    saveMesasLayout(layout);
    drawKanban();
  }

  async function saveMesas() {
    await saveMesasLayoutToDB(mesasCache || INITIAL_MESAS);
    alert('Layout salvo globalmente. Qualquer dispositivo verá as mesmas mesas.');
  }

  function resetMesas() {
    if (!confirm('Resetar todas as mesas? Todos os convidados voltarão para "Sem Mesa".')) return;
    localStorage.removeItem(MESAS_KEY);
    drawKanban();
  }

  // ── RECEPÇÃO ──
  let checkinData = {};
  const CHECKIN_KEY = 'md_recepcao_checkin';

  async function loadCheckinFromDB() {
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/wedding_settings?key=eq.recepcao_checkin&select=value', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      const rows = await res.json();
      if (rows.length && rows[0].value) {
        checkinData = rows[0].value;
        return;
      }
    } catch(e) { console.error('Erro ao carregar check-in:', e); }
    // Fallback localStorage
    try { checkinData = JSON.parse(localStorage.getItem(CHECKIN_KEY) || '{}'); } catch(e) { checkinData = {}; }
  }

  async function saveCheckinToDB() {
    localStorage.setItem(CHECKIN_KEY, JSON.stringify(checkinData));
    try {
      const check = await fetch(SUPABASE_URL + '/rest/v1/wedding_settings?key=eq.recepcao_checkin&select=key', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      const existing = await check.json();
      if (existing.length) {
        await fetch(SUPABASE_URL + '/rest/v1/wedding_settings?key=eq.recepcao_checkin', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY },
          body: JSON.stringify({ value: checkinData, updated_at: new Date().toISOString() })
        });
      } else {
        await fetch(SUPABASE_URL + '/rest/v1/wedding_settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'return=minimal' },
          body: JSON.stringify({ key: 'recepcao_checkin', value: checkinData, updated_at: new Date().toISOString() })
        });
      }
    } catch(e) { console.error('Erro ao salvar check-in:', e); }
  }

  function normalize(str) {
    return (str || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function getGuestMesa(guestId) {
    const layout = loadMesasLayout();
    for (var mesaName in layout) {
      if (layout[mesaName].indexOf(guestId) !== -1) return mesaName;
    }
    return null;
  }

  let recepcaoSearchTerm = '';

  function filterRecepcao(val) {
    recepcaoSearchTerm = val;
    drawRecepcao();
  }

  async function drawRecepcao() {
    if (!checkinData || !Object.keys(checkinData).length) await loadCheckinFromDB();
    if (!allGuests.length) { allGuests = await loadGuests(); }
    if (!mesasCache) await loadMesasLayoutFromDB();

    const board = document.getElementById('recepcao-board');
    const statsEl = document.getElementById('recepcao-stats');
    const casamentoGuests = allGuests.filter(g => !(g.mensagem && g.mensagem.includes('[CHA-COZINHA]')));
    const confirmed = casamentoGuests.filter(g => g.status === 'confirmado');
    const search = normalize(recepcaoSearchTerm);

    // Build full people list per guest
    var guestCards = confirmed.map(function(g) {
      var comps = Array.isArray(g.wedding_companions) ? g.wedding_companions : [];
      var people = [{ name: g.nome, key: 'main', isComp: false }];
      comps.forEach(function(c) { people.push({ name: c.nome, key: c.nome, isComp: true, idade: c.idade || null }); });
      var mesa = getGuestMesa(g.id);
      var ci = checkinData[g.id] || {};
      var allChecked = people.every(function(p) {
        return p.key === 'main' ? ci.arrived : (ci.companions && ci.companions[p.key]);
      });
      var anyChecked = ci.arrived || (ci.companions && Object.values(ci.companions).some(function(v) { return v; }));
      return { guest: g, people: people, mesa: mesa, ci: ci, allChecked: allChecked, anyChecked: anyChecked };
    });

    // Filter by search
    if (search.length > 0) {
      guestCards = guestCards.filter(function(gc) {
        return gc.people.some(function(p) { return normalize(p.name).indexOf(search) !== -1; });
      });
    }

    // Stats
    var totalPeople = 0, arrivedPeople = 0, totalKids = 0, arrivedKids = 0;
    confirmed.forEach(function(g) {
      var comps = Array.isArray(g.wedding_companions) ? g.wedding_companions : [];
      totalPeople += 1 + comps.length;
      var ci = checkinData[g.id] || {};
      if (ci.arrived) arrivedPeople++;
      comps.forEach(function(c) {
        if (c.idade && c.idade < 7) totalKids++;
        if (ci.companions && ci.companions[c.nome]) {
          arrivedPeople++;
          if (c.idade && c.idade < 7) arrivedKids++;
        }
      });
    });
    var pct = totalPeople ? Math.round((arrivedPeople / totalPeople) * 100) : 0;

    statsEl.innerHTML = '<div class="stat"><div class="stat__num">' + totalPeople + '</div><div class="stat__lbl">Esperados</div></div>' +
      '<div class="stat"><div class="stat__num" style="color:#6FCF97">' + arrivedPeople + '</div><div class="stat__lbl">Chegaram</div></div>' +
      '<div class="stat"><div class="stat__num">' + (totalPeople - arrivedPeople) + '</div><div class="stat__lbl">Faltam</div></div>' +
      '<div class="stat"><div class="stat__num" style="color:#FFD700">' + arrivedKids + '/' + totalKids + '</div><div class="stat__lbl">Crian&ccedil;as</div></div>' +
      '<div class="stat"><div class="stat__num" style="color:#6FCF97">' + pct + '%</div><div class="stat__lbl">Presente</div></div>';

    // Separate waiting vs arrived
    var waiting = guestCards.filter(function(gc) { return !gc.allChecked; });
    var arrived = guestCards.filter(function(gc) { return gc.allChecked; });

    // Sort waiting by mesa number
    function mesaSort(a, b) {
      var na = a.mesa ? parseInt((a.mesa.match(/\d+/) || [999])[0]) : 999;
      var nb = b.mesa ? parseInt((b.mesa.match(/\d+/) || [999])[0]) : 999;
      return na - nb;
    }
    waiting.sort(mesaSort);
    arrived.sort(function(a, b) {
      var ta = (a.ci && a.ci.time) || '';
      var tb = (b.ci && b.ci.time) || '';
      return tb.localeCompare(ta);
    });

    var html = '';

    if (waiting.length) {
      html += '<span class="recepcao-section-label">Aguardando (' + waiting.length + ')</span>';
      waiting.forEach(function(gc) { html += buildRecepcaoCard(gc, false); });
    }
    if (arrived.length) {
      html += '<span class="recepcao-section-label" style="color:#6FCF97;">Chegaram (' + arrived.length + ')</span>';
      arrived.forEach(function(gc) { html += buildRecepcaoCard(gc, true); });
    }

    if (!waiting.length && !arrived.length) {
      html = '<div class="recepcao-empty">Nenhum convidado confirmado encontrado.</div>';
    }

    board.innerHTML = html;

    // Bind events
    board.querySelectorAll('.recepcao-person').forEach(function(el) {
      el.addEventListener('click', function() {
        var gid = this.closest('.recepcao-card').dataset.guestId;
        var pkey = this.dataset.personKey;
        var isMain = this.dataset.isMain === 'true';
        togglePerson(gid, pkey, isMain);
      });
    });
    board.querySelectorAll('.recepcao-card__btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        confirmAllArrival(this.dataset.guestId);
      });
    });
  }

  function buildRecepcaoCard(gc, isArrived) {
    var mesaLabel = gc.mesa ? gc.mesa.replace(/\s*—.*/, '') : 'Sem mesa';
    var ci = gc.ci || {};
    var statusClass = isArrived ? 'recepcao-card--arrived' : '';
    var statusHTML = isArrived
      ? '<span class="recepcao-card__status recepcao-card__status--arrived">Chegou' + (ci.time ? ' · ' + ci.time : '') + '</span>'
      : '<span class="recepcao-card__status recepcao-card__status--waiting">Aguardando</span>';

    var peopleHTML = gc.people.map(function(p) {
      var checked = p.key === 'main' ? ci.arrived : (ci.companions && ci.companions[p.key]);
      var compClass = p.isComp ? ' recepcao-person--comp' : '';
      return '<div class="recepcao-person' + compClass + '" data-person-key="' + p.key.replace(/"/g, '&quot;') + '" data-is-main="' + (!p.isComp) + '">' +
        '<div class="recepcao-person__check' + (checked ? ' checked' : '') + '"></div>' +
        '<span class="recepcao-person__name">' + p.name + (p.idade ? '<span style="font-family:var(--fu);font-size:10px;color:var(--white-dim);margin-left:6px;">' + p.idade + ' anos</span>' : '') + '</span>' +
        '</div>';
    }).join('');

    var actionsHTML = isArrived ? '' :
      '<div class="recepcao-card__actions"><button class="recepcao-card__btn" data-guest-id="' + gc.guest.id + '">Confirmar Chegada</button></div>';

    return '<div class="recepcao-card ' + statusClass + '" data-guest-id="' + gc.guest.id + '">' +
      '<div class="recepcao-card__header">' + statusHTML + '<span class="recepcao-card__mesa">' + mesaLabel + '</span></div>' +
      peopleHTML + actionsHTML + '</div>';
  }

  function togglePerson(guestId, personKey, isMain) {
    if (!checkinData[guestId]) checkinData[guestId] = { arrived: false, companions: {}, time: '' };
    var ci = checkinData[guestId];
    if (isMain) {
      ci.arrived = !ci.arrived;
      if (ci.arrived && !ci.time) ci.time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    } else {
      if (!ci.companions) ci.companions = {};
      ci.companions[personKey] = !ci.companions[personKey];
      if (ci.companions[personKey] && !ci.time) {
        ci.arrived = true;
        ci.time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      }
    }
    saveCheckinToDB();
    drawRecepcao();
  }

  function confirmAllArrival(guestId) {
    var g = allGuests.find(function(g) { return g.id === guestId; });
    if (!g) return;
    var comps = Array.isArray(g.wedding_companions) ? g.wedding_companions : [];
    var now = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    checkinData[guestId] = {
      arrived: true,
      time: now,
      companions: {}
    };
    comps.forEach(function(c) { checkinData[guestId].companions[c.nome] = true; });
    saveCheckinToDB();
    drawRecepcao();
  }

  // Init
  renderGuests();
</script>
</body>
</html>
