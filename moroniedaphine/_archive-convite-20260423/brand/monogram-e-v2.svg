<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 210" fill="none" stroke="currentColor" stroke-width="0.6" stroke-linecap="round" stroke-linejoin="round">
  <!-- Variation E v2 — Minimal ligature, hairline single-gesture M→D -->
  <!-- Thinner: 0.6 stroke (was 1.5), slightly more legible M shape, cleaner D bowl resolution -->
  <!--
    Path: rise M left stem, descend to valley, rise to M right peak (= D stem top),
    sweep D bowl right and back, close at base of shared stem.
  -->
  <path d="
    M 50 160
    L 50 52
    L 104 128
    L 104 52
    C 168 52, 182 100, 158 142
    C 144 164, 120 168, 104 160
    L 104 52
  " />
  <!-- Hairline serif caps — anchor the gesture -->
  <path d="M40 52 L60 52 M40 160 L60 160" stroke-width="0.45" />
  <!-- Tiny accent dot — wedding mark signature -->
  <circle cx="180" cy="40" r="1.2" fill="currentColor" stroke="none" />
</svg>
