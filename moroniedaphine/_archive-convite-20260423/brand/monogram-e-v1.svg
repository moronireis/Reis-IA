<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Variation E — Minimal ligature: one continuous stroke forms M→D, abstract -->
  <!--
    Path logic: start bottom-left, rise to upper-left (M left stem),
    descend to center (M valley), rise to upper-center (M right peak),
    which becomes the top of D's stem, then sweeps right as D's bowl,
    returning to bottom-center. One unbroken gesture.
  -->
  <path d="
    M 44 154
    L 44 56
    L 96 122
    L 96 56
    C 158 56, 170 100, 148 138
    C 136 158, 114 162, 96 154
    L 96 56
  " />
  <!-- Single hairline serif caps for anchor -->
  <path d="M36 56 L52 56 M36 154 L52 154" stroke-width="0.9" />
  <!-- Tiny accent dot — wedding mark signature -->
  <circle cx="168" cy="42" r="1.8" fill="currentColor" stroke="none" />
</svg>
