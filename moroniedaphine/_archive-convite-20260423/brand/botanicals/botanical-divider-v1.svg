<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" fill="none" stroke="currentColor" stroke-width="0.75" stroke-linecap="round" stroke-linejoin="round">
  <!-- Horizontal botanical divider — hairline rule with centered floral ornament -->
  <line x1="20" y1="40" x2="240" y2="40" opacity="0.6"/>
  <line x1="360" y1="40" x2="580" y2="40" opacity="0.6"/>
  <!-- left leaves flowing toward center -->
  <path d="M220 40 C 232 34, 246 34, 256 40"/>
  <path d="M240 38 C 236 28, 240 20, 250 20 C 254 28, 250 36, 244 40" opacity="0.85"/>
  <path d="M260 40 C 264 32, 270 28, 278 30" opacity="0.85"/>
  <!-- central rose -->
  <g transform="translate(300 40)">
    <circle cx="0" cy="0" r="2.6"/>
    <path d="M-4 -2 C -10 -8, -10 -18, -2 -20 S 12 -16, 10 -6 S 2 6, -4 -2 Z"/>
    <path d="M4 -2 C 12 -4, 18 -12, 14 -20 S 0 -24, -4 -16"/>
    <path d="M-6 2 C -16 0, -22 -10, -18 -20 S -4 -28, 4 -22"/>
    <path d="M6 4 C 18 6, 24 -4, 22 -14 S 10 -26, 0 -22"/>
    <!-- leaves below rose -->
    <path d="M-14 8 C -22 16, -22 26, -12 28 C -6 22, -8 14, -14 8" opacity="0.8"/>
    <path d="M14 8 C 22 16, 22 26, 12 28 C 6 22, 8 14, 14 8" opacity="0.8"/>
  </g>
  <!-- right leaves flowing from center -->
  <path d="M344 40 C 356 34, 370 34, 380 40"/>
  <path d="M360 38 C 356 28, 360 20, 370 20 C 374 28, 370 36, 364 40" opacity="0.85"/>
  <path d="M322 40 C 326 32, 332 28, 340 30" opacity="0.85"/>
</svg>
