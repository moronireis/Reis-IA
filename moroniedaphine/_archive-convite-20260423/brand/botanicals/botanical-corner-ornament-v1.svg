<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" fill="none" stroke="currentColor" stroke-width="0.75" stroke-linecap="round" stroke-linejoin="round">
  <!-- Corner ornament (top-left) — L-shaped botanical spray to frame a page corner.
       Mirror with transforms for other corners. -->
  <!-- main curving branch from corner -->
  <path d="M20 20 C 60 28, 110 38, 150 58 C 180 74, 200 96, 210 126"/>
  <path d="M20 20 C 28 60, 38 110, 58 150 C 74 180, 96 200, 126 210"/>
  <!-- leaves along horizontal arm -->
  <g>
    <path d="M62 30 C 56 18, 60 6, 74 6 C 82 14, 80 26, 70 32"/>
    <path d="M62 30 C 70 40, 70 50, 60 54" opacity="0.7"/>
  </g>
  <g>
    <path d="M102 40 C 96 26, 102 14, 116 14 C 124 24, 122 36, 110 42"/>
    <path d="M102 40 C 108 52, 106 62, 96 66" opacity="0.7"/>
  </g>
  <g>
    <path d="M140 54 C 136 38, 144 26, 158 28 C 164 40, 160 52, 148 58"/>
  </g>
  <!-- leaves along vertical arm -->
  <g>
    <path d="M30 62 C 18 56, 6 60, 6 74 C 14 82, 26 80, 32 70"/>
    <path d="M30 62 C 40 70, 50 70, 54 60" opacity="0.7"/>
  </g>
  <g>
    <path d="M40 102 C 26 96, 14 102, 14 116 C 24 124, 36 122, 42 110"/>
    <path d="M40 102 C 52 108, 62 106, 66 96" opacity="0.7"/>
  </g>
  <g>
    <path d="M54 140 C 38 136, 26 144, 28 158 C 40 164, 52 160, 58 148"/>
  </g>
  <!-- small rose bud at elbow -->
  <g transform="translate(38 38)">
    <path d="M-4 0 C -8 -6, -6 -14, 2 -14 S 12 -6, 8 2 C 4 6, -2 6, -4 0 Z"/>
    <path d="M-1 -4 C 2 -8, 6 -8, 7 -4" opacity="0.7"/>
  </g>
  <!-- tip flowers -->
  <g transform="translate(210 130)">
    <circle cx="0" cy="0" r="2.4"/>
    <path d="M-6 0 C -10 -8, -2 -14, 6 -10 S 10 4, 0 6 C -6 6, -8 2, -6 0 Z"/>
  </g>
  <g transform="translate(130 210)">
    <circle cx="0" cy="0" r="2.4"/>
    <path d="M-6 0 C -10 -8, -2 -14, 6 -10 S 10 4, 0 6 C -6 6, -8 2, -6 0 Z"/>
  </g>
</svg>
