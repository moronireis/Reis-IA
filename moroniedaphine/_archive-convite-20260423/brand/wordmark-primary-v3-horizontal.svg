<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 160" fill="none">
  <!-- Wordmark primary v3 — horizontal single-line
       Typography: Cormorant Garamond 300, tracking +0.12em, ampersand italic 300
       Hairline engraved stationery feel -->
  <style>
    .wm-serif { font-family: 'Cormorant Garamond', 'Cormorant', 'EB Garamond', Garamond, 'Times New Roman', serif; font-weight: 300; fill: currentColor; }
    .wm-name { font-size: 62px; letter-spacing: 7.4px; }
    .wm-amp  { font-size: 78px; font-style: italic; letter-spacing: 0; }
  </style>
  <g text-anchor="middle">
    <text class="wm-serif wm-name" x="800" y="98">MORONI REIS
      <tspan class="wm-amp" dx="22" dy="-2">&amp;</tspan>
      <tspan dx="22" dy="2">DAPHINE OLIVEIRA</tspan>
    </text>
  </g>
</svg>
