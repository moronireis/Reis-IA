<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
  <!-- Variation B — Interlocking M and D sharing a center vertical -->
  <!-- M: two outer verticals + inner V meeting at shared center line -->
  <g>
    <!-- M left stem -->
    <path d="M42 40 L42 168" />
    <!-- M right stem (shared with D left) -->
    <path d="M120 40 L120 168" />
    <!-- M inner V -->
    <path d="M42 40 L81 120 L120 40" />
    <!-- Fine serifs on M -->
    <path d="M30 40 L54 40 M108 40 L132 40 M30 168 L54 168" />
  </g>
  <g>
    <!-- D bowl: starts at top of shared stem, arcs right and returns to bottom -->
    <path d="M120 40 C 186 40, 210 72, 210 104 C 210 136, 186 168, 120 168" />
    <!-- Fine serifs on D bottom -->
    <path d="M108 168 L132 168" />
  </g>
  <!-- Subtle interlock detail: small gold dot where bowl meets stem -->
  <circle cx="120" cy="104" r="1.6" fill="currentColor" stroke="none" />
</svg>
