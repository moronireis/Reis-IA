<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
  <!-- Variation D — Framed monogram: M&D inside thin oval with hairline double border -->
  <!-- Outer oval -->
  <ellipse cx="100" cy="100" rx="86" ry="92" />
  <!-- Inner oval (double-rule engraved feel) -->
  <ellipse cx="100" cy="100" rx="80" ry="86" stroke-width="0.6" />
  <!-- Tiny decorative diamond accents at cardinal points -->
  <path d="M100 10 l2 3 l-2 3 l-2 -3 z M100 184 l2 3 l-2 3 l-2 -3 z M12 100 l3 2 l3 -2 l-3 -2 z M182 100 l3 2 l3 -2 l-3 -2 z" fill="currentColor" stroke="none" />
  <!-- M&D in serif, centered -->
  <text x="100" y="124" text-anchor="middle" fill="currentColor" stroke="none"
        font-family="'Cormorant Garamond', 'EB Garamond', Garamond, serif"
        font-weight="300" font-size="86" letter-spacing="1">M<tspan font-style="italic" font-size="74" dx="-1">&amp;</tspan><tspan dx="-1">D</tspan></text>
  <!-- Date beneath -->
  <text x="100" y="158" text-anchor="middle" fill="currentColor" stroke="none"
        font-family="'Cormorant Garamond', serif" font-weight="400"
        font-size="11" letter-spacing="4" font-style="italic">12 · VI · MMXXVI</text>
</svg>
