<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 210" fill="none" stroke="currentColor" stroke-width="0.75" stroke-linecap="round" stroke-linejoin="round">
  <!-- Variation B v2 — Interlocking M&D, copperplate hairline -->
  <!-- Thinner: stroke 0.75 (was 1.25), wider viewBox for breathing room, counters opened, serifs lightened -->
  <g>
    <!-- M left stem -->
    <path d="M46 34 L46 176" />
    <!-- Shared center stem (M right / D left) -->
    <path d="M130 34 L130 176" />
    <!-- M inner V — apex lifted for more open counters -->
    <path d="M46 34 L88 128 L130 34" />
    <!-- Hairline serifs on M -->
    <path d="M32 34 L60 34 M116 34 L144 34 M32 176 L60 176" stroke-width="0.6" />
  </g>
  <g>
    <!-- D bowl — wider arc, more generous negative space -->
    <path d="M130 34 C 200 34, 226 66, 226 105 C 226 144, 200 176, 130 176" />
    <!-- Hairline serif on D base -->
    <path d="M116 176 L144 176" stroke-width="0.6" />
  </g>
  <!-- Tiny diamond at junction — 1px accent -->
  <path d="M130 104 L131.2 105.2 L130 106.4 L128.8 105.2 Z" fill="currentColor" stroke="none" />
</svg>
