<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" role="img" aria-label="Buffet Di Matoso">
  <!-- Buffet Di Matoso · Horizontal · Cream on transparent · For charcoal/dark backgrounds -->
  <!-- BUFFET supra-label: Inter 400, ~40% of main size, 0.3em tracking, 75% opacity -->
  <text x="260" y="24"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="12"
        font-weight="400"
        fill="#FAFAF7"
        fill-opacity="0.75"
        text-anchor="middle"
        letter-spacing="0.3em">BUFFET</text>
  <!-- Gold-deep hairline separator: 120px, 0.6 opacity -->
  <line x1="200" y1="36" x2="320" y2="36" stroke="#B8860B" stroke-width="0.8" stroke-opacity="0.6"/>
  <!-- Di Matoso: Cormorant — "Di" 300 normal, "Matoso" 400 italic -->
  <text x="260" y="78"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="48"
        text-anchor="middle"
        fill="#FAFAF7">
    <tspan font-weight="300" letter-spacing="0.02em">Di </tspan>
    <tspan font-weight="400" font-style="italic" letter-spacing="0.01em">Matoso</tspan>
  </text>
</svg>
