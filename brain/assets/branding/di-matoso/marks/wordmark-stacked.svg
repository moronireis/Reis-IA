<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img" aria-label="Buffet Di Matoso">
  <!-- Buffet Di Matoso · Stacked · Restrained proportions -->
  <!-- BUFFET micro-cap supra: Inter 400, wide tracking -->
  <text x="200" y="52"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="13"
        font-weight="400"
        fill="#FAFAF7"
        fill-opacity="0.70"
        text-anchor="middle"
        letter-spacing="0.3em">BUFFET</text>
  <!-- Gold hairline -->
  <line x1="160" y1="66" x2="240" y2="66" stroke="#B8860B" stroke-width="0.8" stroke-opacity="0.6"/>
  <!-- DI: Cormorant 300 normal, large -->
  <text x="200" y="134"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="72"
        font-weight="300"
        fill="#FAFAF7"
        text-anchor="middle"
        letter-spacing="0.08em">DI</text>
  <!-- Matoso: Cormorant italic 400, gold-deep, signature -->
  <text x="200" y="230"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="88"
        font-weight="400"
        font-style="italic"
        fill="#B8860B"
        text-anchor="middle"
        letter-spacing="0.01em">Matoso</text>
</svg>
