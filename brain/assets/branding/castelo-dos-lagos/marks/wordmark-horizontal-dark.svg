<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 80" role="img" aria-label="Castelo dos Lagos">
  <!-- Castelo dos Lagos · Horizontal · Cream+gold on transparent · For dark/forest backgrounds -->
  <!-- "CASTELO" Cormorant 400 uppercase 0.05em | "dos" Cormorant italic 400 55% | "Lagos" Cormorant italic 300 gold -->
  <text x="340" y="56"
        font-family="'Cormorant Garamond', Georgia, serif"
        text-anchor="middle"
        font-size="52"
        fill="#F4EFE6">
    <tspan font-weight="400" letter-spacing="0.05em">CASTELO</tspan>
    <tspan dx="8" font-size="26" font-weight="400" font-style="italic" fill-opacity="0.55" letter-spacing="0.02em">dos</tspan>
    <tspan dx="8" font-weight="300" font-style="italic" fill="#C9A96E" letter-spacing="0.02em">Lagos</tspan>
  </text>
</svg>
