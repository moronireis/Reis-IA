<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" role="img" aria-label="Castelo dos Lagos">
  <!-- Castelo dos Lagos · Stacked · 1.5:1 restrained · Tight line gaps -->
  <!-- Line 1: CASTELO caps, wide tracking -->
  <text x="200" y="80"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="52"
        font-weight="400"
        fill="#F4EFE6"
        text-anchor="middle"
        letter-spacing="0.15em">CASTELO</text>
  <!-- Line 2: dos — editorial breath — small italic, reduced opacity -->
  <text x="200" y="112"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="22"
        font-weight="400"
        font-style="italic"
        fill="#F4EFE6"
        fill-opacity="0.55"
        text-anchor="middle"
        letter-spacing="0.04em">dos</text>
  <!-- Line 3: Lagos — italic gold, large, signature weight -->
  <text x="200" y="210"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="88"
        font-weight="300"
        font-style="italic"
        fill="#C9A96E"
        text-anchor="middle"
        letter-spacing="0.02em">Lagos</text>
</svg>
